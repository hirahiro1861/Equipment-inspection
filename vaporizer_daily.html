<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ベーパライザ日常点検表</title>
<style>
  :root {
    --primary: #154360;
    --primary-light: #1a6da8;
    --accent: #27ae60;
    --warn: #e67e22;
    --danger: #c0392b;
    --bg: #f0f4f8;
    --surface: #ffffff;
    --border: #d0dae6;
    --text: #1c2833;
    --muted: #5d6d7e;
    --purple: #6c3483;
    --purple-light: #8e44ad;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Kaku Gothic ProN','Meiryo',sans-serif; background: var(--bg); color: var(--text); font-size: 14px; transition: background 0.2s, color 0.2s; }

  /* ===== HEADER ===== */
  header {
    background: linear-gradient(135deg, #6c3483, #8e44ad);
    color: #fff;
    padding: 0 16px;
    height: 52px;
    display: flex; align-items: center; justify-content: space-between;
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .btn-back {
    background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4);
    color: #fff; border-radius: 5px; padding: 5px 10px; font-size: 13px;
    cursor: pointer; font-family: inherit; white-space: nowrap;
  }
  header h1 { font-size: 15px; font-weight: 700; letter-spacing: 0.05em; }
  .header-right { font-size: 12px; opacity: 0.85; white-space: nowrap; }

  /* ===== MAIN ===== */
  main { margin-top: 52px; padding: 20px 16px 80px; max-width: 680px; margin-left: auto; margin-right: auto; }

  /* ===== 判定凡例 ===== */
  .legend-box {
    background: #f5eef8; border: 1px solid #d2b4de;
    border-radius: 8px; padding: 12px 16px; margin-bottom: 16px;
  }
  .legend-title { font-size: 11px; font-weight: 700; color: var(--purple-light); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
  .legend-grid { display: flex; gap: 16px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; }
  .legend-badge {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; flex-shrink: 0;
  }
  .lg-ok   { background: #d5f5e3; color: #1e8449; border: 1px solid #27ae60; }
  .lg-warn { background: #fef9e7; color: #d68910; border: 1px solid #e67e22; }
  .lg-ng   { background: #fdedec; color: #c0392b; border: 1px solid #c0392b; }
  .lg-na   { background: #eef2f7; color: #5d6d7e; border: 1px solid #aab; }

  /* ===== 注記ボックス ===== */
  .notice-box {
    background: #eaf4fb; border: 1px solid #aed6f1;
    border-radius: 8px; padding: 12px 16px; margin-bottom: 16px;
    font-size: 12px; color: #1a5276; line-height: 1.7;
  }
  .notice-box strong { display: block; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; margin-bottom: 6px; color: var(--primary-light); }

  /* ===== 入力カード ===== */
  .input-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px 20px; margin-bottom: 16px;
  }
  .input-card-title { font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }
  .field-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .field-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field-row { display: flex; flex-direction: column; gap: 6px; }
  .field-label { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
  .field-row input[type=text],
  .field-row input[type=date],
  .field-row input[type=time],
  .field-row textarea {
    border: 1px solid var(--border); border-radius: 5px; padding: 8px 10px;
    font-size: 14px; font-family: inherit; width: 100%; background: #fff; outline: none;
    transition: border-color 0.15s;
  }
  .field-row input:focus, .field-row textarea:focus { border-color: var(--purple-light); }

  /* ===== インラインドロップダウン ===== */
  .dial-display { border: 1px solid var(--border); border-radius: 5px; padding: 8px 10px; font-size: 14px; background: var(--input-bg, #fff); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: space-between; user-select: none; transition: border-color 0.15s; }
  .dial-display:hover { border-color: var(--purple-light); }
  .dial-display .dial-arrow { color: var(--muted); font-size: 12px; transition: transform 0.15s; }
  .dial-display.open .dial-arrow { transform: rotate(180deg); }
  .dial-dropdown { display: none; border: 1px solid var(--border); border-top: none; border-radius: 0 0 6px 6px; background: var(--surface); overflow: hidden; }
  .dial-dropdown.open { display: block; }
  .dial-dropdown-item { padding: 12px 14px; font-size: 16px; font-weight: 600; cursor: pointer; color: var(--text); transition: background 0.1s; }
  .dial-dropdown-item:hover, .dial-dropdown-item.selected { background: var(--bg3, #f0f4f8); }
  .dial-dropdown-item.selected { color: var(--primary, #1a6cf4); }
  .field-row textarea { resize: vertical; min-height: 56px; }

  /* ===== 点検グループ ===== */
  .check-group {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden; margin-bottom: 16px;
  }
  .group-header {
    background: linear-gradient(135deg, #6c3483, #8e44ad);
    color: #fff; padding: 10px 16px;
    font-size: 13px; font-weight: 700; letter-spacing: 0.05em;
  }

  /* ===== 点検アイテム（判定基準付き） ===== */
  .check-item {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
  }
  .check-item:last-child { border-bottom: none; }
  .check-item-top {
    display: flex; align-items: flex-start; gap: 10px; margin-bottom: 6px;
  }
  .check-no {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--bg, #f5eef8); color: var(--purple-light);
    font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    margin-top: 2px;
  }
  .check-label-wrap { flex: 1; }
  .check-label { font-size: 14px; font-weight: 600; display: block; margin-bottom: 3px; color: var(--text); }
  .check-criteria {
    font-size: 11px; color: var(--muted);
    background: var(--bg3, #f8fafc); border: 1px solid var(--border);
    border-radius: 4px; padding: 4px 8px;
    display: inline-block; line-height: 1.5;
  }
  .judge-group { display: flex; gap: 6px; margin-top: 8px; padding-left: 34px; }
  .judge-group label {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700;
    border: 2px solid var(--border);
    background: var(--surface);
    cursor: pointer; transition: all 0.15s;
    user-select: none; flex-shrink: 0; color: var(--text);
  }
  .judge-group input[type=radio] { display: none; }
  .judge-group label:has(input[value="○"]:checked) { background: #d5f5e3; border-color: #27ae60; color: #1e8449; }
  .judge-group label:has(input[value="△"]:checked) { background: #fef9e7; border-color: #e67e22; color: #d68910; }
  .judge-group label:has(input[value="×"]:checked) { background: #fdedec; border-color: #c0392b; color: #c0392b; }
  .judge-group label:has(input[value="／"]:checked) { background: var(--bg, #eef2f7); border-color: #aab; color: var(--muted); }

  /* ===== 修理必要ボタン ===== */
  .btn-repair-needed {
    padding: 5px 14px; border: 2px solid #7d3c98; border-radius: 20px;
    font-size: 12px; font-family: inherit; font-weight: 700;
    color: #7d3c98; background: var(--input-bg, #fff);
    cursor: pointer; transition: all 0.15s; white-space: nowrap; margin-top: 8px; margin-left: 34px;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .btn-repair-needed.active { background: #7d3c98; color: #fff; }
  .btn-repair-needed::before { content: '🔧'; font-size: 11px; }

  /* ===== 修理依頼書情報エリア ===== */
  .repair-info-card {
    background: #f5eef8; border: 2px solid #7d3c98; border-radius: 8px;
    padding: 14px 16px; margin-bottom: 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .repair-info-title { font-size: 12px; font-weight: 700; color: #7d3c98; letter-spacing: 0.06em; text-transform: uppercase; }

  /* ===== 指示値入力 ===== */
  .value-input-wrap {
    display: flex; align-items: center; gap: 6px;
    margin-top: 8px; padding-left: 34px;
  }
  .value-input-wrap input[type=number] {
    width: 110px; border: 1px solid var(--border); border-radius: 5px;
    padding: 6px 10px; font-size: 15px; font-family: inherit;
    text-align: right; background: var(--input-bg, #fff); color: var(--text); outline: none;
    transition: border-color 0.15s;
  }
  .value-input-wrap input[type=number]:focus { border-color: var(--purple-light); }
  .value-input-wrap .unit { font-size: 13px; color: var(--muted); }

  /* ===== ガス積算計（数値入力） ===== */
  .gas-meter-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px 20px; margin-bottom: 16px;
  }
  .gas-meter-card .card-title {
    font-size: 12px; font-weight: 700; color: var(--muted);
    letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px;
  }
  .gas-meter-card .criteria-text {
    font-size: 11px; color: var(--muted); margin-bottom: 12px;
  }
  .gas-meter-input {
    display: flex; align-items: center; gap: 10px;
  }
  .gas-meter-input input {
    border: 1px solid var(--border); border-radius: 5px; padding: 8px 12px;
    font-size: 18px; font-family: inherit; width: 160px;
    background: var(--input-bg, #fff); color: var(--text); outline: none;
    text-align: right; transition: border-color 0.15s;
  }
  .gas-meter-input input:focus { border-color: var(--purple-light); }
  .gas-meter-input span { font-size: 14px; color: var(--muted); }

  /* ===== 備考 ===== */
  .note-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px 20px; margin-bottom: 20px;
    display: flex; flex-direction: column; gap: 8px;
  }

  /* ===== メディア ===== */
  .media-area { background: var(--bg, #f0f4f8); border: 1px solid var(--border); border-radius: 6px; padding: 12px; }
  .media-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .media-btns button {
    background: var(--input-bg, #fff); color: var(--text); border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 14px; font-size: 13px; font-family: inherit; cursor: pointer;
    display: flex; align-items: center; gap: 6px; transition: all 0.15s;
  }
  .media-btns button:active { background: var(--purple-light); color: #fff; }
  .media-preview { display: flex; flex-wrap: wrap; gap: 8px; }
  .media-thumb { position: relative; width: 80px; height: 80px; border-radius: 6px; overflow: hidden; border: 1px solid var(--border); background: #000; }
  .media-thumb img, .media-thumb video { width: 100%; height: 100%; object-fit: cover; }
  .media-thumb .del-btn { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.6); color: #fff; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; }
  .media-count { font-size: 12px; color: var(--muted); margin-top: 6px; }

  /* ===== 送信フッター ===== */
  .form-footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 12px 16px;
    display: flex; align-items: center; gap: 12px;
    box-shadow: 0 -2px 8px rgba(0,0,0,0.08); z-index: 50;
  }
  .btn-submit {
    background: linear-gradient(135deg, #6c3483, #8e44ad);
    color: #fff; border: none; border-radius: 6px;
    padding: 10px 28px; font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: inherit; transition: opacity 0.15s;
  }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
  .submit-msg { font-size: 13px; }
  .submit-msg.ok  { color: var(--accent); }
  .submit-msg.err { color: var(--danger); }
  .progress-badge { margin-left: auto; font-size: 13px; color: var(--muted); white-space: nowrap; }
  .progress-badge span { font-weight: 700; color: var(--text); }

  @media (max-width: 500px) {
    .field-grid-3 { grid-template-columns: 1fr 1fr; }
    .field-grid-2 { grid-template-columns: 1fr; }
    .judge-group label { width: 32px; height: 32px; font-size: 13px; }
  }
  [data-theme="dark"] {
    --primary: #1a6a9a;
    --primary-light: #3498db;
    --accent: #2ecc71;
    --warn: #e67e22;
    --danger: #e74c3c;
    --bg: #0f1923;
    --surface: #1a2535;
    --border: #2c3e55;
    --text: #e8f0f8;
    --muted: #7a9ab8;
    --bg2: #162030;
    --bg3: #1e2d40;
    --hover-bg: #1e3248;
    --active-bg: #1a3a5c;
    --tag-bg: #162030;
    --group-bg: #162030;
    --media-bg: #162030;
    --input-bg: #1e2d40;
  }
</style>
<script>
(function(){
  var t = localStorage.getItem('theme') || 'light';
  if(t === 'dark') document.documentElement.setAttribute('data-theme','dark');
})();
</script>
</head>
<body>

<!-- ダイヤルピッカーモーダル -->
    <div class="dial-scroll-area">
      <div class="dial-selector-line"></div>
      <div class="dial-list" id="dial-list"></div>
    </div>
  </div>
</div>

<header>
  <div class="header-left">
    <button class="btn-back" onclick="location.href='index.html'">← 戻る</button>
    <h1>💧 ベーパライザ日常点検表</h1>
  </div>
  <div class="header-right" id="header-date" style="display:flex;align-items:center;gap:8px;">
  </div>
</header>
<button id="theme-btn" onclick="toggleTheme()" style="position:fixed;top:10px;right:12px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.4);color:#fff;border-radius:6px;padding:6px 10px;font-size:18px;cursor:pointer;line-height:1;z-index:9999;">🌙</button>

<main>

  <!-- 判定凡例 -->
  <div class="legend-box">
    <div class="legend-title">📋 判定凡例</div>
    <div class="legend-grid">
      <div class="legend-item"><div class="legend-badge lg-ok">○</div><span>正常</span></div>
      <div class="legend-item"><div class="legend-badge lg-warn">△</div><span>処理済</span></div>
      <div class="legend-item"><div class="legend-badge lg-ng">×</div><span>未処理</span></div>
      <div class="legend-item"><div class="legend-badge lg-na">／</div><span>該当なし</span></div>
    </div>
  </div>

  <!-- 注記 -->
  <div class="notice-box">
    <strong>【注記】</strong>
    1．点検の方法および処置は、取扱説明書の34〜36ページを参照してください。<br>
    2．ガスメーター積算計の指示は、メーターがついている場合に実施してください。<br>
    3．始業時の漏洩検査は、LPガスの供給を開始した直後に実施してください。
  </div>

  <!-- 入力ヘッダー -->
  <div class="input-card">
    <div class="input-card-title">点検情報</div>
    <div class="field-grid-3">
      <div class="field-row">
        <label class="field-label">点検日</label>
        <input type="date" id="f-date">
      </div>
      <div class="field-row">
        <label class="field-label">点検時刻</label>
        <input type="time" id="f-time">
      </div>
      <div class="field-row">
        <label class="field-label">点検者</label>
        <div class="dial-picker-wrap">
          <div class="dial-display" onclick="openDial('f-submitter')">
            <span id="f-submitter-label">選択してください</span>
            <span class="dial-arrow">▼</span>
          </div>
          <input type="hidden" id="f-submitter" value="">
        </div>
      </div>
    </div>
  </div>

  <!-- 点検グループ（JS生成） -->
  <div id="check-groups"></div>

  <!-- ガス積算計 -->
  <div class="gas-meter-card">
    <div class="card-title">ガス積算計の指示</div>
    <div class="criteria-text">終業時と比較して著しく積算されていないこと</div>
    <div class="gas-meter-input">
      <input type="number" id="f-gas-meter" placeholder="0.00" step="0.01" min="0">
      <span>%</span>
    </div>
  </div>

  <!-- 修理依頼書情報 -->
  <div class="repair-info-card" id="repair-section" style="display:none">
    <div class="repair-info-title">🔧 修理依頼書情報</div>
    <div class="field-row">
      <label class="field-label">所属上司</label>
      <div class="dial-picker-wrap">
        <div class="dial-display" onclick="openDial('f-supervisor')">
          <span id="f-supervisor-label">選択してください</span>
          <span class="dial-arrow">▼</span>
        </div>
        <input type="hidden" id="f-supervisor" value="">
      </div>
    </div>
    <div style="font-size:12px;color:#7d3c98;">※ 修理依頼が必要な項目の「修理依頼」ボタンをONにしてください</div>
  </div>

  <!-- 感想・特記事項 -->
  <div class="note-card">
    <label class="field-label">感想・特記事項</label>
    <textarea id="f-note" placeholder="異常内容・処置内容・気になったことなど（音声入力可）"></textarea>
    <label class="field-label" style="margin-top:8px;">画像・動画</label>
    <div class="media-area">
      <div class="media-btns">
        <button type="button" onclick="document.getElementById('f-image').click()">📷 画像を追加</button>
        <button type="button" onclick="document.getElementById('f-video').click()">🎥 動画を追加（5秒以内）</button>
      </div>
      <input type="file" id="f-image" accept="image/*" multiple style="display:none" onchange="addMedia(this,'image')">
      <input type="file" id="f-video" accept="video/*" style="display:none" onchange="addMedia(this,'video')">
      <div class="media-preview" id="media-preview"></div>
      <div class="media-count" id="media-count"></div>
    </div>
  </div>

</main>

<div class="form-footer">
  <button class="btn-submit" id="btn-submit" onclick="submitForm()">保存・送信</button>
  <span class="submit-msg" id="submit-msg"></span>
  <div class="progress-badge">回答済み <span id="answered-count">0</span> / <span id="total-count">0</span></div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbww9ISmeHo-cbwlfwVTHOsP2eHacHIprniNiK5Q-nem-OL2QDlqnkv5csipdReeRYSs1w/exec';

// ===== 修理必要トグル =====
const repairItems = {};

function toggleRepair(no) {
  repairItems[no] = !repairItems[no];
  const btn = document.getElementById('repair-btn-' + no);
  if (btn) btn.classList.toggle('active', repairItems[no]);
  const anyRepair = Object.values(repairItems).some(v => v);
  const sec = document.getElementById('repair-section');
  if (sec) sec.style.display = anyRepair ? '' : 'none';
}

// ===== 所属上司リスト =====
let SUPERVISORS = [];

async function loadSupervisors() {
  try {
    const res = await fetch(`${GAS_URL}?action=getSupervisors`);
    const data = await res.json();
    if (data.supervisors && data.supervisors.length > 0) SUPERVISORS = data.supervisors;
  } catch (e) { /* オフライン時フォールバック */ }
}

// ===== 点検者リスト =====
// スプレッドシート「設定」シートC列（C2:C11）から取得
// 追加・変更はスプレッドシートのC列を編集するだけでOK（コード変更不要）
let INSPECTORS = ['大平　洋行', '坂本　貴志']; // フォールバック用（オフライン時）

async function loadInspectors() {
  try {
    const res = await fetch(`${GAS_URL}?action=getInspectors`);
    const data = await res.json();
    if (data.inspectors && data.inspectors.length > 0) {
      INSPECTORS = data.inspectors;
    }
  } catch (e) {
    // オフライン時はフォールバック値を使用
  }
}

// ===== インラインドロップダウン =====
let dialTargetId = null;

async function openDial(targetId) {
  // 既に開いている場合は閉じる
  const existingDrop = document.getElementById('drop-' + targetId);
  if (existingDrop && existingDrop.classList.contains('open')) {
    closeDial(targetId);
    return;
  }
  // 他のドロップダウンをすべて閉じる
  document.querySelectorAll('.dial-dropdown.open').forEach(d => {
    d.classList.remove('open');
    const disp = d.previousElementSibling;
    if (disp) disp.classList.remove('open');
  });

  let list = [];
  if (targetId === 'f-supervisor') {
    await loadSupervisors();
    list = SUPERVISORS.length > 0 ? SUPERVISORS : ['（未設定）'];
  } else {
    await loadInspectors();
    list = INSPECTORS;
  }

  dialTargetId = targetId;
  const currentVal = document.getElementById(targetId)?.value || '';

  // ドロップダウン要素を生成または更新
  let drop = document.getElementById('drop-' + targetId);
  if (!drop) {
    drop = document.createElement('div');
    drop.className = 'dial-dropdown';
    drop.id = 'drop-' + targetId;
    const display = document.getElementById(targetId + '-label')?.closest('.dial-display');
    if (display && display.parentNode) {
      display.parentNode.insertBefore(drop, display.nextSibling);
    }
  }
  drop.innerHTML = list.map(name =>
    `<div class="dial-dropdown-item${name === currentVal ? ' selected' : ''}" onclick="selectDialItem('${targetId}', this)">${name}</div>`
  ).join('');

  drop.classList.add('open');
  const display = document.getElementById(targetId + '-label')?.closest('.dial-display');
  if (display) display.classList.add('open');
}

function selectDialItem(targetId, el) {
  const selected = el.textContent;
  const hidden = document.getElementById(targetId);
  const label  = document.getElementById(targetId + '-label');
  if (hidden) hidden.value = selected;
  if (label)  label.textContent = selected;
  closeDial(targetId);
}

function closeDial(targetId) {
  const drop = document.getElementById('drop-' + (targetId || dialTargetId));
  if (drop) drop.classList.remove('open');
  const display = document.getElementById((targetId || dialTargetId) + '-label')?.closest('.dial-display');
  if (display) display.classList.remove('open');
}

// 外側タップで閉じる
document.addEventListener('click', e => {
  if (!e.target.closest('.dial-picker-wrap')) {
    document.querySelectorAll('.dial-dropdown.open').forEach(d => {
      d.classList.remove('open');
      const disp = d.previousElementSibling;
      if (disp) disp.classList.remove('open');
    });
  }
});

// ===== 点検項目定義（判定基準付き） =====

  },

  },

    items: [

// ===== 初期値セット =====

// ===== 点検グループ生成 =====

// ===== 進捗更新 =====
function updateProgress() {
  let count = 0;
  for (let i = 1; i <= TOTAL; i++) {
    if (document.querySelector(`input[name="item-${i}"]:checked`)) count++;
  }
  document.getElementById('answered-count').textContent = count;
}

// ===== メディア管理 =====
const mediaFiles = [];

function addMedia(input, type) {
  Array.from(input.files).forEach(file => {
    if (type === 'video') {
      const video = document.createElement('video');
      const url = URL.createObjectURL(file);
      video.src = url;
      video.onloadedmetadata = () => {
        if (video.duration > 5) { alert('動画は5秒以内にしてください（' + video.duration.toFixed(1) + '秒）'); URL.revokeObjectURL(url); return; }
        mediaFiles.push({ file, type, url });
        renderMediaPreview();
      };
    } else {
      const url = URL.createObjectURL(file);
      mediaFiles.push({ file, type, url });
      renderMediaPreview();
    }
  });
  input.value = '';
}

function renderMediaPreview() {
  const preview = document.getElementById('media-preview');
  const count   = document.getElementById('media-count');
  if (!preview) return;
  preview.innerHTML = mediaFiles.map((m, i) => `
    <div class="media-thumb">
      ${m.type === 'image' ? `<img src="${m.url}">` : `<video src="${m.url}" muted playsinline></video>`}
      <button class="del-btn" onclick="removeMedia(${i})">×</button>
    </div>
  `).join('');
  if (count) count.textContent = mediaFiles.length > 0 ? `${mediaFiles.length}件追加済み` : '';
}

function removeMedia(i) {
  URL.revokeObjectURL(mediaFiles[i].url);
  mediaFiles.splice(i, 1);
  renderMediaPreview();
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ===== 送信処理 =====
async function submitForm() {
  const date      = document.getElementById('f-date').value;
  const time      = document.getElementById('f-time').value;
  const submitter = document.getElementById('f-submitter').value.trim();
  const note      = document.getElementById('f-note').value.trim();
  const gasMeter  = document.getElementById('f-gas-meter').value;
  const msg       = document.getElementById('submit-msg');
  const btn       = document.getElementById('btn-submit');

  if (!submitter) { msg.textContent = '点検者名を入力してください'; msg.className = 'submit-msg err'; return; }

  // 全項目収集
  const items = {};
  const values = {};
  let unchecked = [];
  GROUPS.forEach(g => {
    g.items.forEach(item => {
      const checked = document.querySelector(`input[name="item-${item.no}"]:checked`);
      if (checked) {
        items[item.label] = checked.value;
      } else {
        unchecked.push(item.label);
      }
      if (item.valueInput) {
        const v = document.getElementById('val-' + item.no);
        if (v && v.value) values[item.label] = v.value + item.valueInput.unit;
      }
    });
  });

  if (unchecked.length > 0) {
    msg.textContent = `未選択の項目があります：${unchecked.slice(0,2).join('、')}${unchecked.length > 2 ? '…他' : ''}`;
    msg.className = 'submit-msg err';
    return;
  }

  btn.disabled = true;
  msg.textContent = '送信中...';
  msg.className = 'submit-msg';

  const requireRepair = Object.values(repairItems).some(v => v);
  const supervisor = document.getElementById('f-supervisor')?.value.trim() || '';

  if (requireRepair && !supervisor) {
    msg.textContent = '修理依頼書のため所属上司を選択してください';
    msg.className = 'submit-msg err';
    btn.disabled = false;
    return;
  }

  // localStorage に今日の完了フラグ書き込み
  const today = new Date().toISOString().slice(0, 10);
  localStorage.setItem(`vaporizer_daily_${today}`, JSON.stringify({ done: true, ts: Date.now() }));

  const mediaData = [];
  for (const m of mediaFiles) {
    const base64 = await fileToBase64(m.file);
    mediaData.push({ name: m.file.name, type: m.type, mimeType: m.file.type, data: base64 });
  }

  const payload = {
    sheetName: 'ベーパライザ記録',
    date, time, submitter,
    gasMeter: gasMeter || '',
    items, values, note,
    requireRepair, supervisor,
    repairItems: { ...repairItems },
    media: mediaData
  };

  try {
    const res = await fetch(GAS_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload) });
    const json = await res.json();
    if (json.status === 'ok') {
      msg.textContent = '✔ 保存しました';
      msg.className = 'submit-msg ok';
      mediaFiles.length = 0;
      renderMediaPreview();
    } else {
      throw new Error(json.message || 'エラー');
    }
  } catch(e) {
    msg.textContent = '送信エラー: ' + e.message;
    msg.className = 'submit-msg err';
  }
  btn.disabled = false;
}

// ===== ダークモード =====
function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const newTheme = isDark ? 'light' : 'dark';
  applyTheme(newTheme);
  localStorage.setItem('theme', newTheme);
}
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'dark' : '');
  const btn = document.getElementById('theme-btn');
  if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
}
(function() {
  const saved = localStorage.getItem('theme') || 'light';
  applyTheme(saved);
})();
</script>

<script>
// ===== スワイプで点検表切り替え（アニメーション付き） =====
(function() {
  const PREV     = 'boiler_daily.html';
  const NEXT     = 'inspection_app.html';
  const THRESHOLD = 50;
  const MAX_VERT  = 35;

  let startX = 0, startY = 0;
  let isHoriz = null; // null=未確定, true=横, false=縦

  function setTranslate(x, animate) {
    document.body.style.transition = animate
      ? 'transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94)'
      : 'none';
    document.body.style.transform = `translateX(${x}px)`;
  }

  document.addEventListener('touchstart', function(e) {
    startX  = e.touches[0].clientX;
    startY  = e.touches[0].clientY;
    isHoriz = null;
    document.body.style.transition = 'none';
    document.body.style.transform  = 'translateX(0)';
  }, { passive: true });

  document.addEventListener('touchmove', function(e) {
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;

    // 方向未確定のうちに判断
    if (isHoriz === null) {
      if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
        isHoriz = Math.abs(dx) > Math.abs(dy);
      }
      return;
    }

    if (!isHoriz) return; // 縦スクロールと確定したら何もしない

    // 横スワイプ確定：デフォルト動作を止めて画面を追従させる
    e.preventDefault();
    const resistance = 0.45;
    setTranslate(dx * resistance, false);
  }, { passive: false }); // ← preventDefaultのためpassive:false

  document.addEventListener('touchend', function(e) {
    if (!isHoriz) {
      setTranslate(0, false);
      return;
    }

    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;

    if (Math.abs(dy) > MAX_VERT && Math.abs(dy) > Math.abs(dx)) {
      setTranslate(0, true);
      return;
    }

    if (dx > THRESHOLD) {
      setTranslate(window.innerWidth, true);
      setTimeout(() => { window.location.href = NEXT; }, 280);
    } else if (dx < -THRESHOLD) {
      setTranslate(-window.innerWidth, true);
      setTimeout(() => { window.location.href = PREV; }, 280);
    } else {
      setTranslate(0, true);
    }
  }, { passive: true });
})();
</script>
