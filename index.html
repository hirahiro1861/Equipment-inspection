<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="設備点検">
<title>設備点検システム</title>
<style>
  :root {
    --primary:       #1a3a52;
    --primary-mid:   #1e5276;
    --primary-light: #2980b9;
    --accent:        #e8a020;
    --accent-light:  #f5c050;
    --danger:        #c0392b;
    --ok:            #27ae60;
    --bg:            #0f1e2d;
    --surface:       #162840;
    --surface2:      #1e3550;
    --border:        #2a4a6a;
    --text:          #e8f0f8;
    --muted:         #7a9ab8;
  }
  [data-theme="light"] {
    --primary:       #1a5276;
    --primary-mid:   #2471a3;
    --primary-light: #2980b9;
    --accent:        #d4850a;
    --accent-light:  #e8a020;
    --danger:        #c0392b;
    --ok:            #27ae60;
    --bg:            #f0f4f8;
    --surface:       #ffffff;
    --surface2:      #eef2f7;
    --border:        #d0dae6;
    --text:          #1c2833;
    --muted:         #5d6d7e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Meiryo', sans-serif;
    transition: background 0.2s, color 0.2s;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* 背景グリッド */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(41,128,185,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(41,128,185,0.06) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ===== HEADER ===== */
  header {
    position: relative;
    z-index: 10;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-mid) 100%);
    border-bottom: 1px solid var(--border);
    padding: 28px 24px 24px;
    text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  .header-icon {
    font-size: 36px;
    display: block;
    margin-bottom: 8px;
    filter: drop-shadow(0 0 12px rgba(232,160,32,0.6));
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { filter: drop-shadow(0 0 12px rgba(232,160,32,0.6)); }
    50%       { filter: drop-shadow(0 0 20px rgba(232,160,32,0.9)); }
  }

  header h1 {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 0.1em;
    color: var(--text);
  }

  header p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.05em;
  }

  /* ===== DATE BAR ===== */
  .date-bar {
    position: relative;
    z-index: 10;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    color: var(--muted);
  }

  .date-bar .date-now {
    color: var(--accent-light);
    font-weight: 700;
    font-size: 14px;
  }

  /* ===== MAIN ===== */
  main {
    position: relative;
    z-index: 10;
    padding: 24px 16px 40px;
    max-width: 520px;
    margin: 0 auto;
  }

  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    padding-left: 4px;
    border-left: 3px solid var(--accent);
    padding-left: 8px;
  }

  /* ===== CARD ===== */
  .card-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 32px;
  }

  .card {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    text-decoration: none;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  /* 左ラインアクセント */
  .card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: var(--card-color, var(--primary-light));
    border-radius: 12px 0 0 12px;
  }

  .card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 60%);
    pointer-events: none;
  }

  .card:active {
    transform: scale(0.97);
    background: var(--surface2);
    border-color: var(--card-color, var(--primary-light));
  }

  .card-icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
    background: var(--card-icon-bg, rgba(41,128,185,0.15));
    border: 1px solid var(--card-color, rgba(41,128,185,0.3));
  }

  .card-body {
    flex: 1;
    min-width: 0;
  }

  .card-title {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.03em;
    margin-bottom: 4px;
  }

  .card-desc {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-arrow {
    font-size: 18px;
    color: var(--muted);
    flex-shrink: 0;
    transition: transform 0.2s;
  }

  .card:active .card-arrow {
    transform: translateX(4px);
  }

  /* ===== カラーバリエーション ===== */
  .card-blue  { --card-color: #2980b9; --card-icon-bg: rgba(41,128,185,0.15); }
  .card-teal  { --card-color: #16a085; --card-icon-bg: rgba(22,160,133,0.15); }
  .card-red   { --card-color: #c0392b; --card-icon-bg: rgba(192,57,43,0.15); }
  .card-orange{ --card-color: #e67e22; --card-icon-bg: rgba(230,126,34,0.15); }
  .card-purple{ --card-color: #8e44ad; --card-icon-bg: rgba(142,68,173,0.15); }

  /* ===== 点検状況バッジ ===== */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 10px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge-done {
    background: rgba(39,174,96,0.2);
    color: #2ecc71;
    border: 1px solid rgba(39,174,96,0.4);
  }
  .badge-undone {
    background: rgba(192,57,43,0.2);
    color: #e74c3c;
    border: 1px solid rgba(192,57,43,0.4);
  }
  .badge-loading {
    background: rgba(122,154,184,0.15);
    color: var(--muted);
    border: 1px solid rgba(122,154,184,0.2);
  }

  /* シフト表示テキスト */
  .shift-text {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
  }

  /* ===== 一括送信ボタン ===== */
  .bulk-send-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.25);
    color: var(--text);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .bulk-send-btn:not(:disabled) {
    background: rgba(232,160,32,0.2);
    border-color: var(--accent);
    color: var(--accent-light);
  }
  .bulk-send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .bulk-send-btn:not(:disabled):active { background: var(--accent); color: #fff; }

  /* ===== FOOTER ===== */
  footer {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 16px;
    font-size: 11px;
    color: var(--muted);
    border-top: 1px solid var(--border);
  }

  /* ===== セーフエリア対応 ===== */
  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    footer { padding-bottom: calc(16px + env(safe-area-inset-bottom)); }
  }
</style>
</head>
<body>

<header style="position:relative;">
  <button id="theme-btn" onclick="toggleTheme()" style="position:absolute;top:12px;right:16px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.35);color:#fff;border-radius:6px;padding:6px 10px;font-size:18px;cursor:pointer;line-height:1;z-index:10;">🌙</button>
  <span class="header-icon">⚙</span>
  <h1>設備点検システム</h1>
  <p>固形燃料製造施設</p>
</header>

<div class="date-bar">
  <span>点検表を選択してください</span>
  <span class="date-now" id="date-now"></span>
</div>

<main>
  <p class="section-label">点検表メニュー</p>

  <div class="card-list">

    <a class="card card-blue" href="inspection_app.html">
      <div class="card-icon">🔧</div>
      <div class="card-body">
        <div class="card-title">機器点検表</div>
        <div class="card-desc">モータ・ポンプ・槽など 44台</div>
        <div class="shift-text" id="shift-label-kiki"></div>
        <div style="margin-top:6px;">
          <button class="bulk-send-btn" id="bulk-btn-kiki" onclick="event.preventDefault();bulkSend('kiki')" disabled>一括送信 -</button>
        </div>
      </div>
      <span class="status-badge badge-loading" id="badge-kiki">確認中</span>
      <span class="card-arrow">›</span>
    </a>

    <a class="card card-teal" href="piping_inspection.html">
      <div class="card-icon">🔩</div>
      <div class="card-body">
        <div class="card-title">配管点検表</div>
        <div class="card-desc">各配管 22系統</div>
        <div class="shift-text" id="shift-label-piping"></div>
        <div style="margin-top:6px;">
          <button class="bulk-send-btn" id="bulk-btn-piping" onclick="event.preventDefault();bulkSend('piping')" disabled>一括送信 -</button>
        </div>
      </div>
      <span class="status-badge badge-loading" id="badge-piping">確認中</span>
      <span class="card-arrow">›</span>
    </a>

    <a class="card card-red" href="boiler_daily.html">
      <div class="card-icon">🔥</div>
      <div class="card-body">
        <div class="card-title">ボイラー日常点検表</div>
        <div class="card-desc">高圧蒸気ボイラー（三浦工業）始業前・日常</div>
        <div class="shift-text" id="shift-label-boiler"></div>
      </div>
      <span class="status-badge badge-loading" id="badge-boiler">確認中</span>
      <span class="card-arrow">›</span>
    </a>

    <a class="card card-purple" href="vaporizer_daily.html">
      <div class="card-icon">💧</div>
      <div class="card-body">
        <div class="card-title">ベーパライザ日常点検表</div>
        <div class="card-desc">ベーパライザ MIN-ED 日常点検</div>
        <div class="shift-text" id="shift-label-vaporizer"></div>
      </div>
      <span class="status-badge badge-loading" id="badge-vaporizer">確認中</span>
      <span class="card-arrow">›</span>
    </a>

  </div>
</main>

<footer>設備点検システム &copy; 2026</footer>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxpIRGowSYlple1BEA75lHbxlv_K_LTBw0gFjW0R7swNhKMcW79Boi0BuUl59SJSGRf/exec';
const KIKI_TOTAL   = 44;
const PIPING_TOTAL = 22;

// ===== 日時表示 =====
function updateDate() {
  const now = new Date();
  const w = ['日','月','火','水','木','金','土'];
  document.getElementById('date-now').textContent =
    `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${w[now.getDay()]}）`;
}
updateDate();

// ===== シフト判定 =====
function getCurrentShift() {
  const h = new Date().getHours();
  if (h < 7)  return '夜勤（0:00〜6:59）';
  if (h < 15) return '日勤（7:00〜14:59）';
  return '準夜（15:00〜23:59）';
}

// ===== バッジ更新 =====
function setBadge(id, done, count, total) {
  const el = document.getElementById(id);
  if (!el) return;
  const countStr = (count !== undefined && total !== undefined) ? ` ${count}/${total}` : '';
  if (done) {
    el.textContent = '✅ 完了' + countStr;
    el.className = 'status-badge badge-done';
  } else {
    el.textContent = '⚠ 未点検' + countStr;
    el.className = 'status-badge badge-undone';
  }
}

// ===== 一括送信ボタン更新 =====
function updateBulkBtn(type, tempCount, total) {
  const btn = document.getElementById(`bulk-btn-${type}`);
  if (!btn) return;
  if (tempCount > 0) {
    btn.textContent = `一括送信 ${tempCount}/${total}`;
    btn.disabled = false;
  } else {
    btn.textContent = `一括送信 -`;
    btn.disabled = true;
  }
}

// ===== localStorageから状況を読み取り =====
function loadFromLocalStorage() {
  const today = new Date().toISOString().slice(0, 10);
  const shift = getCurrentShift();

  // シフト表示
  ['kiki','piping'].forEach(key => {
    const el = document.getElementById('shift-label-' + key);
    if (el) el.textContent = shift;
  });
  ['boiler','vaporizer'].forEach(key => {
    const el = document.getElementById('shift-label-' + key);
    if (el) el.textContent = '本日';
  });

  // 機器点検（全件送信済みで完了）
  let kikiSent = 0, kikiTemp = 0;
  for (let i = 0; i < 9999; i++) {
    const keys = Object.keys(localStorage).filter(k => k.startsWith(`kiki_sent_${today}_${shift}_`));
    kikiSent = keys.length;
    break;
  }
  kikiSent = Object.keys(localStorage).filter(k => k.startsWith(`kiki_sent_${today}_${shift}_`)).length;
  kikiTemp = Object.keys(localStorage).filter(k => k.startsWith(`kiki_temp_${today}_${shift}_`)).length;
  setBadge('badge-kiki', kikiSent >= KIKI_TOTAL, kikiSent, KIKI_TOTAL);
  updateBulkBtn('kiki', kikiTemp, KIKI_TOTAL);

  // 配管点検（全件送信済みで完了）
  const pipingSent = Object.keys(localStorage).filter(k => k.startsWith(`piping_sent_${today}_${shift}_`)).length;
  const pipingTemp = Object.keys(localStorage).filter(k => k.startsWith(`piping_temp_${today}_${shift}_`)).length;
  setBadge('badge-piping', pipingSent >= PIPING_TOTAL, pipingSent, PIPING_TOTAL);
  updateBulkBtn('piping', pipingTemp, PIPING_TOTAL);

  // ボイラー・ベーパライザ（当日1回送信で完了）
  if (localStorage.getItem(`boiler_daily_${today}`))    setBadge('badge-boiler',    true);
  if (localStorage.getItem(`vaporizer_daily_${today}`)) setBadge('badge-vaporizer', true);
}

// ===== GASから最新状況を取得 =====
async function loadFromGAS() {
  try {
    const res  = await fetch(GAS_URL);
    const json = await res.json();
    if (json.status !== 'ok') return;
    const d = json.data;
    const today = new Date().toISOString().slice(0, 10);
    const shift = getCurrentShift();

    // GASが完了→上書き。未完了でもlocalStorageが完了なら上書きしない
    const kikiSent = Object.keys(localStorage).filter(k => k.startsWith(`kiki_sent_${today}_${shift}_`)).length;
    const pipingSent = Object.keys(localStorage).filter(k => k.startsWith(`piping_sent_${today}_${shift}_`)).length;

    if (d.inspection_app?.done  || kikiSent >= KIKI_TOTAL)   setBadge('badge-kiki',   true, Math.max(kikiSent, d.inspection_app?.count ?? 0), KIKI_TOTAL);
    if (d.piping_inspection?.done || pipingSent >= PIPING_TOTAL) setBadge('badge-piping', true, Math.max(pipingSent, d.piping_inspection?.count ?? 0), PIPING_TOTAL);
    if (d.boiler_daily?.done    || localStorage.getItem(`boiler_daily_${today}`))    setBadge('badge-boiler',    true);
    if (d.vaporizer_daily?.done || localStorage.getItem(`vaporizer_daily_${today}`)) setBadge('badge-vaporizer', true);

    ['kiki','piping'].forEach(key => {
      const el = document.getElementById('shift-label-' + key);
      if (el && json.shift) el.textContent = json.shift;
    });
  } catch(e) { /* ネットワークエラー時はlocalStorageのまま */ }
}

// ===== 一括送信 =====
async function bulkSend(type) {
  const btn = document.getElementById(`bulk-btn-${type}`);
  const today = new Date().toISOString().slice(0, 10);
  const shift = getCurrentShift();
  const prefix = type === 'kiki'
    ? `kiki_temp_${today}_${shift}_`
    : `piping_temp_${today}_${shift}_`;

  const tempKeys = Object.keys(localStorage).filter(k => k.startsWith(prefix));
  if (tempKeys.length === 0) return;

  btn.disabled = true;
  btn.textContent = '送信中...';

  let successCount = 0;
  let errorCount   = 0;

  for (const key of tempKeys) {
    const data = JSON.parse(localStorage.getItem(key));
    const sentKey = key.replace('_temp_', '_sent_');

    // payloadを組み立て
    let payload;
    if (type === 'kiki') {
      const tag = key.split('_').pop();
      payload = {
        sheetName: '点検記録',
        date: data.date, time: data.time, submitter: data.submitter,
        tag, deviceName: data.deviceName || '', pattern: data.pattern || '',
        items: data.items, note: data.note || '', media: []
      };
    } else {
      const no = parseInt(key.split('_').pop());
      payload = {
        sheetName: '配管点検記録',
        date: data.date, time: data.time, shift: data.shift || shift,
        submitter: data.submitter,
        pipeNo: no, pipeName: data.pipeName || '',
        items: data.items, note: data.note || '', media: []
      };
    }

    try {
      const res  = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
      const json = await res.json();
      if (json.status === 'ok') {
        // tempを削除してsentに昇格
        localStorage.removeItem(key);
        localStorage.setItem(sentKey, JSON.stringify(data));
        successCount++;
      } else {
        errorCount++;
      }
    } catch(e) {
      errorCount++;
    }
  }

  // 結果表示
  alert(`一括送信完了：${successCount}件成功${errorCount > 0 ? '、' + errorCount + '件失敗' : ''}`);

  // バッジ・ボタン再読み込み
  loadFromLocalStorage();
}

// ===== 初期化 =====
loadFromLocalStorage();
loadFromGAS();
setInterval(loadFromGAS, 5 * 60 * 1000);

// ===== ダークモード =====
function toggleTheme() {
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  const newTheme = isLight ? 'dark' : 'light';
  applyTheme(newTheme);
  localStorage.setItem('theme', newTheme);
}
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme === 'light' ? 'light' : '');
  const btn = document.getElementById('theme-btn');
  if (btn) btn.textContent = theme === 'light' ? '🌙' : '☀️';
}
(function() {
  const saved = localStorage.getItem('theme') || 'dark';
  applyTheme(saved);
})();
</script>

</body>
</html>
