<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ボイラー日常点検表</title>
<style>
  :root {
    --primary: #922b21;
    --primary-light: #c0392b;
    --accent: #27ae60;
    --warn: #e67e22;
    --danger: #c0392b;
    --bg: #f0f4f8;
    --surface: #ffffff;
    --border: #d0dae6;
    --text: #1c2833;
    --muted: #5d6d7e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Kaku Gothic ProN','Meiryo',sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

  /* ===== HEADER ===== */
  header {
    background: linear-gradient(135deg, #922b21, #c0392b);
    color: #fff;
    padding: 0 16px;
    height: 52px;
    display: flex; align-items: center; justify-content: space-between;
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .btn-back {
    background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4);
    color: #fff; border-radius: 5px; padding: 5px 10px; font-size: 13px;
    cursor: pointer; font-family: inherit; white-space: nowrap;
  }
  header h1 { font-size: 15px; font-weight: 700; letter-spacing: 0.05em; }
  .header-right { font-size: 12px; opacity: 0.85; white-space: nowrap; }

  /* ===== MAIN ===== */
  main { margin-top: 52px; padding: 20px 16px 60px; max-width: 680px; margin-left: auto; margin-right: auto; }

  /* ===== 判定凡例 ===== */
  .legend-box {
    background: #fff8f0;
    border: 1px solid #f0c080;
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 20px;
  }
  .legend-title { font-size: 11px; font-weight: 700; color: var(--warn); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
  .legend-grid { display: flex; gap: 16px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; }
  .legend-badge {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; flex-shrink: 0;
  }
  .lg-ok   { background: #d5f5e3; color: #1e8449; border: 1px solid #27ae60; }
  .lg-warn { background: #fef9e7; color: #d68910; border: 1px solid #e67e22; }
  .lg-ng   { background: #fdedec; color: #c0392b; border: 1px solid #c0392b; }
  .lg-na   { background: #eef2f7; color: #5d6d7e; border: 1px solid #aab; }

  /* ===== 入力ヘッダーカード ===== */
  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 20px;
  }
  .input-card-title {
    font-size: 12px; font-weight: 700; color: var(--muted);
    letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px;
  }
  .field-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .field-row { display: flex; flex-direction: column; gap: 6px; }
  .field-label { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
  .field-row input[type=text],
  .field-row input[type=date],
  .field-row input[type=time],
  .field-row textarea {
    border: 1px solid var(--border); border-radius: 5px; padding: 8px 10px;
    font-size: 14px; font-family: inherit; width: 100%; background: #fff; outline: none;
    transition: border-color 0.15s;
  }
  .field-row input:focus, .field-row textarea:focus { border-color: var(--primary-light); }
  .field-row textarea { resize: vertical; min-height: 56px; }

  /* ===== ダイヤルピッカー ===== */
  .dial-picker-wrap { position: relative; }
  .dial-display { border: 1px solid var(--border); border-radius: 5px; padding: 8px 10px; font-size: 14px; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: space-between; user-select: none; transition: border-color 0.15s; }
  .dial-display:hover { border-color: var(--primary-light); }
  .dial-display .dial-arrow { color: var(--muted); font-size: 12px; }
  .dial-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: flex-end; justify-content: center; }
  .dial-modal-overlay.open { display: flex; }
  .dial-modal { background: #fff; border-radius: 16px 16px 0 0; width: 100%; max-width: 520px; padding-bottom: env(safe-area-inset-bottom, 0); overflow: hidden; }
  .dial-modal-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; border-bottom: 1px solid var(--border); }
  .dial-modal-title { font-size: 14px; font-weight: 700; }
  .dial-modal-done { background: linear-gradient(135deg, #922b21, #c0392b); color: #fff; border: none; border-radius: 6px; padding: 6px 16px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .dial-scroll-area { position: relative; height: 200px; overflow: hidden; }
  .dial-scroll-area::before, .dial-scroll-area::after { content: ''; position: absolute; left: 0; right: 0; height: 70px; z-index: 2; pointer-events: none; }
  .dial-scroll-area::before { top: 0; background: linear-gradient(to bottom, rgba(255,255,255,1), rgba(255,255,255,0)); }
  .dial-scroll-area::after { bottom: 0; background: linear-gradient(to top, rgba(255,255,255,1), rgba(255,255,255,0)); }
  .dial-selector-line { position: absolute; left: 20px; right: 20px; top: 50%; transform: translateY(-50%); height: 44px; border-top: 2px solid #c0392b; border-bottom: 2px solid #c0392b; border-radius: 4px; z-index: 1; pointer-events: none; }
  .dial-list { position: absolute; left: 0; right: 0; top: 0; cursor: grab; touch-action: none; }
  .dial-list:active { cursor: grabbing; }
  .dial-item { height: 44px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 600; color: var(--muted); transition: color 0.15s, font-size 0.15s; user-select: none; }
  .dial-item.selected { color: var(--text); font-size: 20px; }

  /* ===== 点検グループ ===== */
  .check-group {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .group-header {
    background: linear-gradient(135deg, #922b21, #c0392b);
    color: #fff;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .check-item {
    padding: 0;
    border-bottom: 1px solid #f0f4f8;
  }
  .check-item:last-child { border-bottom: none; }

  /* タップ可能な上段（項目名＋ラジオ） */
  .check-item-top {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    gap: 12px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .check-item-top:active { background: #fdf0ef; }

  .check-no {
    width: 24px; height: 24px; border-radius: 50%;
    background: #f0f4f8; color: var(--muted);
    font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .check-label-wrap { flex: 1; display: flex; align-items: center; gap: 6px; }
  .check-label { font-size: 14px; }
  .hint-icon {
    font-size: 15px; color: var(--muted); flex-shrink: 0;
    transition: transform 0.2s;
  }
  .check-item.open .hint-icon { transform: rotate(180deg); color: var(--primary-light); }

  /* アコーディオン本体 */
  .check-detail {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.25s ease, padding 0.25s ease;
    background: #fff8f7;
    border-top: 0px solid var(--border);
  }
  .check-item.open .check-detail {
    max-height: 200px;
    border-top: 1px solid #f5c6c0;
  }
  .check-detail-inner {
    padding: 10px 16px 12px 52px;
    font-size: 12px;
    color: #5d3030;
    line-height: 1.7;
  }

  /* ===== 指示値入力 ===== */
  .value-input-wrap {
    display: flex; align-items: center; gap: 4px; flex-shrink: 0;
  }
  .value-input-wrap input[type=number] {
    width: 80px; border: 1px solid var(--border); border-radius: 5px;
    padding: 5px 8px; font-size: 14px; font-family: inherit;
    text-align: right; background: #fff; outline: none;
    transition: border-color 0.15s;
  }
  .value-input-wrap input[type=number]:focus { border-color: var(--primary-light); }
  .value-input-wrap .unit { font-size: 12px; color: var(--muted); white-space: nowrap; }

  /* ===== 判定ラジオ ===== */
  .judge-group { display: flex; gap: 6px; }
  .judge-group label {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700;
    border: 2px solid var(--border);
    cursor: pointer; transition: all 0.15s;
    user-select: none; flex-shrink: 0;
    color: var(--muted);
  }
  .judge-group input[type=radio] { display: none; }
  .judge-group label:has(input[value="○"]:checked) { background: #d5f5e3; border-color: #27ae60; color: #1e8449; }
  .judge-group label:has(input[value="△"]:checked) { background: #fef9e7; border-color: #e67e22; color: #d68910; }
  .judge-group label:has(input[value="×"]:checked) { background: #fdedec; border-color: #c0392b; color: #c0392b; }
  .judge-group label:has(input[value="／"]:checked) { background: #eef2f7; border-color: #aab;    color: var(--muted); }

  /* ===== 備考・特記 ===== */
  .note-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 20px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .note-card .field-label { font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: 0.06em; }

  /* ===== 送信フッター ===== */
  .form-footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    display: flex; align-items: center; gap: 12px;
    box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
    z-index: 50;
  }
  .btn-submit {
    background: linear-gradient(135deg, #922b21, #c0392b);
    color: #fff; border: none; border-radius: 6px;
    padding: 10px 28px; font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: inherit; transition: opacity 0.15s;
  }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
  .submit-msg { font-size: 13px; }
  .submit-msg.ok  { color: var(--accent); }
  .submit-msg.err { color: var(--danger); }

  /* ===== 進捗バッジ ===== */
  .progress-badge {
    margin-left: auto;
    font-size: 13px;
    color: var(--muted);
  }
  .progress-badge span { font-weight: 700; color: var(--text); }

  /* ===== メディア ===== */
  .media-area { background: #f0f4f8; border: 1px solid var(--border); border-radius: 6px; padding: 12px; }
  .media-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .media-btns button {
    background: #fff; border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 14px; font-size: 13px; font-family: inherit; cursor: pointer;
    display: flex; align-items: center; gap: 6px; transition: all 0.15s;
  }
  .media-btns button:active { background: var(--primary-light); color: #fff; }
  .media-preview { display: flex; flex-wrap: wrap; gap: 8px; }
  .media-thumb { position: relative; width: 80px; height: 80px; border-radius: 6px; overflow: hidden; border: 1px solid var(--border); background: #000; }
  .media-thumb img, .media-thumb video { width: 100%; height: 100%; object-fit: cover; }
  .media-thumb .del-btn { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.6); color: #fff; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; }
  .media-count { font-size: 12px; color: var(--muted); margin-top: 6px; }

  @media (max-width: 500px) {
    .field-grid { grid-template-columns: 1fr 1fr; }
    .judge-group label { width: 32px; height: 32px; font-size: 13px; }
  }
</style>
</head>
<body>

<!-- ダイヤルピッカーモーダル -->
<div class="dial-modal-overlay" id="dial-overlay" onclick="dialOverlayClick(event)">
  <div class="dial-modal">
    <div class="dial-modal-header">
      <span class="dial-modal-title">点検者を選択</span>
      <button class="dial-modal-done" onclick="closeDial()">完了</button>
    </div>
    <div class="dial-scroll-area">
      <div class="dial-selector-line"></div>
      <div class="dial-list" id="dial-list"></div>
    </div>
  </div>
</div>

<header>
  <div class="header-left">
    <button class="btn-back" onclick="location.href='index.html'">← 戻る</button>
    <h1>🔥 ボイラー日常点検表</h1>
  </div>
  <div class="header-right" id="header-date"></div>
</header>

<main>

  <!-- 判定凡例 -->
  <div class="legend-box">
    <div class="legend-title">📋 判定凡例</div>
    <div class="legend-grid">
      <div class="legend-item"><div class="legend-badge lg-ok">○</div><span>正常</span></div>
      <div class="legend-item"><div class="legend-badge lg-warn">△</div><span>処理済</span></div>
      <div class="legend-item"><div class="legend-badge lg-ng">×</div><span>未処理</span></div>
      <div class="legend-item"><div class="legend-badge lg-na">／</div><span>該当なし</span></div>
    </div>
  </div>

  <!-- 入力ヘッダー -->
  <div class="input-card">
    <div class="input-card-title">点検情報</div>
    <div class="field-grid">
      <div class="field-row">
        <label class="field-label">点検日</label>
        <input type="date" id="f-date">
      </div>
      <div class="field-row">
        <label class="field-label">点検時刻</label>
        <input type="time" id="f-time">
      </div>
      <div class="field-row">
        <label class="field-label">点検者</label>
        <div class="dial-picker-wrap">
          <div class="dial-display" onclick="openDial('f-submitter')">
            <span id="f-submitter-label">選択してください</span>
            <span class="dial-arrow">▼</span>
          </div>
          <input type="hidden" id="f-submitter" value="">
        </div>
      </div>
    </div>
  </div>

  <!-- 点検項目：ボイラ室 -->
  <div class="check-group" id="group-boilerroom"></div>

  <!-- 点検項目：ボイラ本体 -->
  <div class="check-group" id="group-boilerbody"></div>

  <!-- 感想・特記事項 -->
  <div class="note-card">
    <label class="field-label">感想・特記事項</label>
    <textarea id="f-note" placeholder="異常内容・処置内容・気になったことなど（音声入力可）"></textarea>
    <label class="field-label" style="margin-top:8px;">画像・動画</label>
    <div class="media-area">
      <div class="media-btns">
        <button type="button" onclick="document.getElementById('f-image').click()">📷 画像を追加</button>
        <button type="button" onclick="document.getElementById('f-video').click()">🎥 動画を追加（5秒以内）</button>
      </div>
      <input type="file" id="f-image" accept="image/*" multiple style="display:none" onchange="addMedia(this,'image')">
      <input type="file" id="f-video" accept="video/*" style="display:none" onchange="addMedia(this,'video')">
      <div class="media-preview" id="media-preview"></div>
      <div class="media-count" id="media-count"></div>
    </div>
  </div>

</main>

<div class="form-footer">
  <button class="btn-submit" id="btn-submit" onclick="submitForm()">保存・送信</button>
  <span class="submit-msg" id="submit-msg"></span>
  <div class="progress-badge">回答済み <span id="answered-count">0</span> / <span id="total-count">12</span></div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbww9ISmeHo-cbwlfwVTHOsP2eHacHIprniNiK5Q-nem-OL2QDlqnkv5csipdReeRYSs1w/exec';

// ===== 点検者リスト =====
const INSPECTORS = ['大平', '坂本'];

// ===== ダイヤルピッカー =====
const ITEM_H = 44, PADDING = 3;
let dialTargetId = null, dialIndex = 0, dialStartY = 0, dialStartOffset = 0, dialOffset = 0, dialDragging = false;

function buildDialList() {
  const list = document.getElementById('dial-list');
  if (!list) return;
  const items = [...Array(PADDING).fill(''), ...INSPECTORS, ...Array(PADDING).fill('')];
  list.style.top = `${(200 / 2) - (ITEM_H / 2) - PADDING * ITEM_H}px`;
  list.innerHTML = items.map((n, i) => `<div class="dial-item" data-idx="${i - PADDING}">${n}</div>`).join('');
  applyDialTransform(0); attachDialEvents();
}
function applyDialTransform(offset) {
  dialOffset = Math.max(-(INSPECTORS.length - 1) * ITEM_H, Math.min(0, offset));
  const list = document.getElementById('dial-list');
  if (list) list.style.transform = `translateY(${dialOffset}px)`;
  dialIndex = Math.max(0, Math.min(INSPECTORS.length - 1, Math.round(-dialOffset / ITEM_H)));
  document.querySelectorAll('.dial-item').forEach(el => el.classList.toggle('selected', parseInt(el.dataset.idx) === dialIndex));
}
function snapDial() { applyDialTransform(-dialIndex * ITEM_H); }
function attachDialEvents() {
  const list = document.getElementById('dial-list');
  if (!list) return;
  list.addEventListener('touchstart', e => { dialDragging = true; dialStartY = e.touches[0].clientY; dialStartOffset = dialOffset; }, { passive: true });
  list.addEventListener('touchmove',  e => { if (dialDragging) applyDialTransform(dialStartOffset + e.touches[0].clientY - dialStartY); }, { passive: true });
  list.addEventListener('touchend',   () => { dialDragging = false; snapDial(); });
  list.addEventListener('mousedown',  e => { dialDragging = true; dialStartY = e.clientY; dialStartOffset = dialOffset; });
  window.addEventListener('mousemove',e => { if (dialDragging) applyDialTransform(dialStartOffset + e.clientY - dialStartY); });
  window.addEventListener('mouseup',  () => { if (dialDragging) { dialDragging = false; snapDial(); } });
}
function openDial(targetId) {
  dialTargetId = targetId;
  const idx = INSPECTORS.indexOf(document.getElementById(targetId)?.value);
  buildDialList(); applyDialTransform(idx >= 0 ? -idx * ITEM_H : 0); snapDial();
  document.getElementById('dial-overlay').classList.add('open');
}
function closeDial() {
  const selected = INSPECTORS[dialIndex] || '';
  if (dialTargetId) {
    const h = document.getElementById(dialTargetId);
    const l = document.getElementById(dialTargetId + '-label');
    if (h) h.value = selected;
    if (l) l.textContent = selected || '選択してください';
  }
  document.getElementById('dial-overlay').classList.remove('open');
}
function dialOverlayClick(e) { if (e.target === document.getElementById('dial-overlay')) closeDial(); }

// ===== 点検項目定義（チェック内容付き） =====
const GROUPS = [
  {
    id: 'boilerroom',
    title: 'ボイラ室',
    items: [
      { no: 1,  label: '煙突（排気筒）チェック',   detail: '穴あき、外れ、出口の閉塞がないか確認します。不具合があると一酸化炭素中毒や火災の恐れがあります。' },
      { no: 2,  label: '水漏れチェック',           detail: 'ボイラ室内に水漏れがないか確認します。水漏れは感電や故障の原因となります。' },
      { no: 3,  label: '可燃物チェック',           detail: 'ボイラから45cm以内、および制御ボックス内に燃えやすいものを置かないようにします。' },
      { no: 4,  label: '軟水チェック',             detail: '給水が軟水になっているかチェックします。' },
      { no: 5,  label: '薬注のチェック',           detail: '薬液タンクの薬品が2/3以上入っているか、薬品漏れがないか確認します。' },
      { no: 6,  label: '薬品漏れのチェック',       detail: 'ボイラー室内に薬品漏れがないか確認します。' },
      { no: 7,  label: '燃焼状態のチェック',       detail: '排気筒から黒煙や白煙が出ていないか確認します。' },
      { no: 8,  label: '運転状態の監視',           detail: '燃焼ランプが点灯し、正常に作動しているか確認します。' },
    ]
  },
  {
    id: 'boilerbody',
    title: 'ボイラ本体',
    items: [
      { no: 9,  label: 'ボイラ状態のチェック',         detail: '燃焼中に規定の範囲内（機種により異なるが概ね0.7〜1.7MPa）にあるか確認します。',  valueInput: { unit: 'MPa', placeholder: '0.00' } },
      { no: 10, label: 'ガス圧力のチェック',           detail: '圧力計の指針が極端に振れたり、デジタル表示と大きくズレたりしていないか確認します。', valueInput: { unit: 'kPa', placeholder: '0.0' } },
      { no: 11, label: '異音・異臭・振動のチェック',   detail: '異常な振動、燃焼音、作動音がないか、また焦げ臭いなどの異臭がしないか確認します。' },
      { no: 12, label: '水面変動のチェック',           detail: '運転開始から30分程度経過した際（高燃焼時）、水面計の水位が極端に上下動していないか確認します。' },
    ]
  }
];

const TOTAL = GROUPS.reduce((s, g) => s + g.items.length, 0);
document.getElementById('total-count').textContent = TOTAL;

// ===== 初期値セット =====
const now = new Date();
document.getElementById('f-date').value = now.toISOString().slice(0, 10);
document.getElementById('f-time').value = now.toTimeString().slice(0, 5);
const w = ['日','月','火','水','木','金','土'];
document.getElementById('header-date').textContent =
  `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}（${w[now.getDay()]}）`;

// ===== 点検グループ生成（アコーディオン対応） =====
GROUPS.forEach(g => {
  const el = document.getElementById('group-' + g.id);
  el.innerHTML = `
    <div class="group-header">🔥 ${g.title}</div>
    ${g.items.map(item => `
      <div class="check-item" id="ci-${item.no}">
        <div class="check-item-top" onclick="toggleDetail(${item.no})">
          <div class="check-no">${item.no}</div>
          <div class="check-label-wrap">
            <span class="check-label">${item.label}</span>
            <span class="hint-icon">▼</span>
          </div>
          ${item.valueInput ? `
          <div class="value-input-wrap" onclick="event.stopPropagation()">
            <input type="number" id="val-${item.no}" placeholder="${item.valueInput.placeholder}" step="0.01" min="0">
            <span class="unit">${item.valueInput.unit}</span>
          </div>` : ''}
          <div class="judge-group" onclick="event.stopPropagation()">
            ${['○','△','×','／'].map(v =>
              `<label><input type="radio" name="item-${item.no}" value="${v}" onchange="updateProgress()"><span>${v}</span></label>`
            ).join('')}
          </div>
        </div>
        <div class="check-detail">
          <div class="check-detail-inner">📝 ${item.detail}</div>
        </div>
      </div>
    `).join('')}
  `;
});

// ===== アコーディオン開閉 =====
function toggleDetail(no) {
  const item = document.getElementById('ci-' + no);
  item.classList.toggle('open');
}

// ===== 進捗更新 =====
function updateProgress() {
  let count = 0;
  for (let i = 1; i <= TOTAL; i++) {
    if (document.querySelector(`input[name="item-${i}"]:checked`)) count++;
  }
  document.getElementById('answered-count').textContent = count;
}

// ===== メディア管理 =====
const mediaFiles = [];

function addMedia(input, type) {
  Array.from(input.files).forEach(file => {
    if (type === 'video') {
      const video = document.createElement('video');
      const url = URL.createObjectURL(file);
      video.src = url;
      video.onloadedmetadata = () => {
        if (video.duration > 5) { alert('動画は5秒以内にしてください（' + video.duration.toFixed(1) + '秒）'); URL.revokeObjectURL(url); return; }
        mediaFiles.push({ file, type, url });
        renderMediaPreview();
      };
    } else {
      const url = URL.createObjectURL(file);
      mediaFiles.push({ file, type, url });
      renderMediaPreview();
    }
  });
  input.value = '';
}

function renderMediaPreview() {
  const preview = document.getElementById('media-preview');
  const count   = document.getElementById('media-count');
  if (!preview) return;
  preview.innerHTML = mediaFiles.map((m, i) => `
    <div class="media-thumb">
      ${m.type === 'image' ? `<img src="${m.url}">` : `<video src="${m.url}" muted playsinline></video>`}
      <button class="del-btn" onclick="removeMedia(${i})">×</button>
    </div>
  `).join('');
  if (count) count.textContent = mediaFiles.length > 0 ? `${mediaFiles.length}件追加済み` : '';
}

function removeMedia(i) {
  URL.revokeObjectURL(mediaFiles[i].url);
  mediaFiles.splice(i, 1);
  renderMediaPreview();
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ===== 送信処理 =====
async function submitForm() {
  const date      = document.getElementById('f-date').value;
  const time      = document.getElementById('f-time').value;
  const submitter = document.getElementById('f-submitter').value.trim();
  const note      = document.getElementById('f-note').value.trim();
  const msg       = document.getElementById('submit-msg');
  const btn       = document.getElementById('btn-submit');

  if (!submitter) { msg.textContent = '点検者名を入力してください'; msg.className = 'submit-msg err'; return; }

  // 全項目収集
  const items = {};
  const values = {};
  let unchecked = [];
  GROUPS.forEach(g => {
    g.items.forEach(item => {
      const checked = document.querySelector(`input[name="item-${item.no}"]:checked`);
      if (checked) {
        items[item.label] = checked.value;
      } else {
        unchecked.push(item.label);
      }
      if (item.valueInput) {
        const v = document.getElementById('val-' + item.no);
        if (v && v.value) values[item.label] = v.value + item.valueInput.unit;
      }
    });
  });

  if (unchecked.length > 0) {
    msg.textContent = `未選択の項目があります：${unchecked.slice(0,2).join('、')}${unchecked.length > 2 ? '…他' : ''}`;
    msg.className = 'submit-msg err';
    return;
  }

  btn.disabled = true;
  msg.textContent = '送信中...';
  msg.className = 'submit-msg';

  // localStorage に完了フラグ書き込み
  const today = new Date().toISOString().slice(0, 10);
  localStorage.setItem(`boiler_daily_${today}`, JSON.stringify({ done: true, ts: Date.now() }));

  const mediaData = [];
  for (const m of mediaFiles) {
    const base64 = await fileToBase64(m.file);
    mediaData.push({ name: m.file.name, type: m.type, mimeType: m.file.type, data: base64 });
  }

  const payload = {
    sheetName: 'ボイラー日常記録',
    date, time, submitter,
    items, values, note,
    media: mediaData
  };

  try {
    const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
    const json = await res.json();
    if (json.status === 'ok') {
      msg.textContent = '✔ 保存しました';
      msg.className = 'submit-msg ok';
      mediaFiles.length = 0;
      renderMediaPreview();
    } else {
      throw new Error(json.message || 'エラー');
    }
  } catch(e) {
    msg.textContent = '送信エラー: ' + e.message;
    msg.className = 'submit-msg err';
  }
  btn.disabled = false;
}
</script>
