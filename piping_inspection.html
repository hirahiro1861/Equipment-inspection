<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>配管点検表</title>
<style>
  :root {
    --primary: #1a5276;
    --primary-light: #2980b9;
    --accent: #27ae60;
    --warn: #e67e22;
    --danger: #c0392b;
    --bg: #f0f4f8;
    --surface: #ffffff;
    --border: #d0dae6;
    --text: #1c2833;
    --muted: #5d6d7e;
    --teal: #16a085;
    --sidebar-w: 260px;
    --bg2: #eef2f7;
    --bg3: #f8fafc;
    --hover-bg: #eef6ff;
    --active-bg: #d6eaf8;
    --tag-bg: #eef2f7;
    --group-bg: #eef2f7;
    --media-bg: #f0f4f8;
    --input-bg: #ffffff;
  }

  [data-theme="dark"] {
    --primary: #1a6a9a;
    --primary-light: #3498db;
    --accent: #2ecc71;
    --warn: #e67e22;
    --danger: #e74c3c;
    --bg: #0f1923;
    --surface: #1a2535;
    --border: #2c3e55;
    --text: #e8f0f8;
    --muted: #7a9ab8;
    --bg2: #162030;
    --bg3: #1e2d40;
    --hover-bg: #1e3248;
    --active-bg: #1a3a5c;
    --tag-bg: #162030;
    --group-bg: #162030;
    --media-bg: #162030;
    --input-bg: #1e2d40;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Kaku Gothic ProN','Meiryo',sans-serif; background: var(--bg); color: var(--text); font-size: 14px; transition: background 0.2s, color 0.2s; }

  /* ===== HEADER ===== */
  header {
    background: var(--teal);
    color: #fff;
    padding: 0 16px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .btn-back {
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.4);
    color: #fff;
    border-radius: 5px;
    padding: 5px 10px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
  }
  header h1 { font-size: 16px; font-weight: 700; letter-spacing: 0.05em; }
  .header-right { display: flex; align-items: center; gap: 12px; font-size: 13px; }
  #progress-text { opacity: 0.85; }
  .progress-bar-wrap { width: 120px; height: 8px; background: rgba(255,255,255,0.25); border-radius: 4px; overflow: hidden; }
  #progress-bar { height: 100%; background: #2ecc71; border-radius: 4px; transition: width 0.4s; width: 0%; }

  /* ===== LAYOUT ===== */
  .layout { display: flex; margin-top: 52px; min-height: calc(100vh - 52px); }

  /* ===== SIDEBAR ===== */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    position: fixed;
    top: 52px; left: 0; bottom: 0;
    overflow-y: auto;
    padding: 8px 0;
  }
  .device-item {
    padding: 10px 14px 10px 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    border-bottom: 1px solid #f0f4f8;
    transition: background 0.15s;
  }
  .device-item:hover { background: #eef6ff; }
  .device-item.active { background: #d6f5ef; border-left: 3px solid var(--teal); padding-left: 17px; }
  .device-name { font-size: 13px; flex: 1; line-height: 1.4; }
  .no-badge {
    font-size: 10px;
    color: var(--muted);
    background: #eef2f7;
    border-radius: 3px;
    padding: 1px 5px;
    flex-shrink: 0;
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: #d0dae6; }
  .status-dot.ok   { background: var(--accent); }
  .status-dot.ng   { background: var(--danger); }
  .status-dot.temp { background: #e67e22; }
  .btn-submit { background: var(--teal); color: #fff; border: none; border-radius: 6px; padding: 10px 20px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; transition: background 0.15s; }
  .btn-submit:hover { background: #138d75; }
  .btn-submit:disabled { background: #aaa; cursor: not-allowed; }
  .btn-temp-save { background: #fff; color: var(--teal); border: 2px solid var(--teal); border-radius: 6px; padding: 10px 20px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .btn-temp-save:hover { background: #eef9f6; }
  .btn-temp-save:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ===== 点検済バッジ ===== */
  .done-badge {
    font-size: 10px; font-weight: 700;
    padding: 2px 6px; border-radius: 8px;
    flex-shrink: 0; white-space: nowrap;
  }
  .done-badge.ok   { background: #d5f5e3; color: #1e8449; border: 1px solid #27ae60; }
  .done-badge.ng   { background: #fdedec; color: #c0392b; border: 1px solid #c0392b; }
  .done-badge.temp { background: #fef9e7; color: #d68910; border: 1px solid #e67e22; }

  /* ===== MAIN ===== */
  .main { margin-left: var(--sidebar-w); flex: 1; padding: 24px 20px 40px; }
  .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 400px; color: var(--muted); text-align: center; gap: 12px; }
  .welcome .icon { font-size: 48px; opacity: 0.4; }
  .welcome p { font-size: 15px; }

  /* ===== FORM CARD ===== */
  .form-card { background: var(--surface); border-radius: 8px; border: 1px solid var(--border); overflow: hidden; max-width: 680px; }
  .form-header { background: var(--teal); color: #fff; padding: 14px 20px; display: flex; align-items: center; gap: 12px; }
  .form-header .no-tag { font-size: 11px; background: rgba(255,255,255,0.25); padding: 3px 8px; border-radius: 4px; }
  .form-header h2 { font-size: 15px; flex: 1; }
  .form-body { padding: 20px; display: flex; flex-direction: column; gap: 16px; }

  /* ===== フィールド ===== */
  .field-row { display: flex; flex-direction: column; gap: 6px; }
  .field-label { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .field-row input[type=text],
  .field-row input[type=date],
  .field-row input[type=time],
  .field-row textarea,
  .field-row select {
    border: 1px solid var(--border); border-radius: 5px; padding: 8px 10px;
    font-size: 14px; font-family: inherit; width: 100%; background: #fff; outline: none;
    transition: border-color 0.15s;
  }
  .field-row input:focus, .field-row textarea:focus { border-color: var(--teal); }

  /* ===== ダイヤルピッカー ===== */
  .dial-picker-wrap { position: relative; }
  .dial-display { border: 1px solid var(--border); border-radius: 5px; padding: 8px 10px; font-size: 14px; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: space-between; user-select: none; transition: border-color 0.15s; }
  .dial-display:hover { border-color: var(--teal); }
  .dial-display .dial-arrow { color: var(--muted); font-size: 12px; }
  .dial-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: flex-end; justify-content: center; }
  .dial-modal-overlay.open { display: flex; }
  .dial-modal { background: #fff; border-radius: 16px 16px 0 0; width: 100%; max-width: 520px; padding-bottom: env(safe-area-inset-bottom, 0); overflow: hidden; }
  .dial-modal-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; border-bottom: 1px solid var(--border); }
  .dial-modal-title { font-size: 14px; font-weight: 700; color: var(--text); }
  .dial-modal-done { background: var(--teal); color: #fff; border: none; border-radius: 6px; padding: 6px 16px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .dial-scroll-area { position: relative; height: 200px; overflow: hidden; }
  .dial-scroll-area::before, .dial-scroll-area::after { content: ''; position: absolute; left: 0; right: 0; height: 70px; z-index: 2; pointer-events: none; }
  .dial-scroll-area::before { top: 0; background: linear-gradient(to bottom, rgba(255,255,255,1), rgba(255,255,255,0)); }
  .dial-scroll-area::after { bottom: 0; background: linear-gradient(to top, rgba(255,255,255,1), rgba(255,255,255,0)); }
  .dial-selector-line { position: absolute; left: 20px; right: 20px; top: 50%; transform: translateY(-50%); height: 44px; border-top: 2px solid var(--teal); border-bottom: 2px solid var(--teal); border-radius: 4px; z-index: 1; pointer-events: none; }
  .dial-list { position: absolute; left: 0; right: 0; top: 0; cursor: grab; touch-action: none; }
  .dial-list:active { cursor: grabbing; }
  .dial-item { height: 44px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 600; color: var(--muted); transition: color 0.15s, font-size 0.15s; user-select: none; }
  .dial-item.selected { color: var(--text); font-size: 20px; }

  /* ===== 配管情報 ===== */
  .piping-info {
    background: #f0faf8;
    border: 1px solid #a8d8ce;
    border-radius: 6px;
    padding: 12px 14px;
    font-size: 13px;
  }
  .piping-info-grid { display: grid; grid-template-columns: auto 1fr; gap: 4px 12px; }
  .piping-info-label { color: var(--muted); font-size: 12px; }
  .piping-info-value { font-weight: 600; }

  /* ===== 点検項目（目視） ===== */
  .inspection-item {
    background: #f8fafc;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .inspection-label { font-size: 14px; font-weight: 600; flex: 0 0 60px; }
  .radio-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .radio-group label {
    display: flex; align-items: center; gap: 5px; cursor: pointer;
    padding: 5px 12px; border: 1px solid var(--border); border-radius: 20px;
    font-size: 13px; transition: all 0.15s; user-select: none;
  }
  .radio-group input[type=radio] { display: none; }
  .radio-group input[type=radio]:checked + span { font-weight: 700; }
  .radio-group label:has(input[value="異常なし"]:checked) { background: #d5f5e3; border-color: var(--accent); color: #1e8449; }
  .radio-group label:has(input[value="要注意"]:checked)  { background: #fef9e7; border-color: var(--warn);   color: #d68910; }
  .radio-group label:has(input[value="異常あり"]:checked){ background: #fdedec; border-color: var(--danger); color: var(--danger); }
  .radio-group label:has(input[value="該当なし"]:checked){ background: #eef2f7; border-color: #aab;          color: var(--muted); }

  /* ===== 備考 ===== */
  .field-row textarea { resize: vertical; min-height: 64px; }
  .preset-palette { background: #f0f4f8; border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; margin-bottom: 8px; }
  .preset-group-label { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
  .preset-btns { display: flex; flex-wrap: wrap; gap: 6px; }
  .preset-btns button {
    background: #fff; border: 1px solid var(--border); border-radius: 16px;
    padding: 5px 12px; font-size: 12px; font-family: inherit; color: var(--text);
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .preset-btns button:active { background: var(--teal); color: #fff; border-color: var(--teal); }

  /* ===== メディア ===== */
  .media-area { background: #f0f4f8; border: 1px solid var(--border); border-radius: 6px; padding: 12px; }
  .media-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .media-btns button {
    background: #fff; border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 14px; font-size: 13px; font-family: inherit; cursor: pointer;
    display: flex; align-items: center; gap: 6px; transition: all 0.15s;
  }
  .media-btns button:active { background: var(--teal); color: #fff; }
  .media-preview { display: flex; flex-wrap: wrap; gap: 8px; }
  .media-thumb { position: relative; width: 80px; height: 80px; border-radius: 6px; overflow: hidden; border: 1px solid var(--border); background: #000; }
  .media-thumb img, .media-thumb video { width: 100%; height: 100%; object-fit: cover; }
  .media-thumb .del-btn { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.6); color: #fff; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; }
  .media-count { font-size: 12px; color: var(--muted); margin-top: 6px; }

  /* ===== SUBMIT ===== */
  .form-footer { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .btn-submit { background: var(--teal); color: #fff; border: none; border-radius: 6px; padding: 10px 28px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; transition: background 0.15s; }
  .btn-submit:hover { background: #138d75; }
  .btn-submit:disabled { background: #aaa; cursor: not-allowed; }
  .submit-msg { font-size: 13px; }
  .submit-msg.ok  { color: var(--accent); }
  .submit-msg.err { color: var(--danger); }

  /* ===== MOBILE ===== */
  @media (max-width: 700px) {
    :root { --sidebar-w: 100%; }
    .sidebar { position: static; width: 100%; height: auto; max-height: calc(100vh - 52px); border-right: none; border-bottom: 1px solid var(--border); overflow-y: auto; }
    .layout { flex-direction: column; }
    .main { margin-left: 0; padding: 12px; }
    .header-right .progress-bar-wrap { width: 80px; }
    .welcome { display: none; }
    .sidebar.has-form { max-height: 200px; }
  }
</style>
<script>
(function(){
  var t = localStorage.getItem('theme') || 'light';
  if(t === 'dark') document.documentElement.setAttribute('data-theme','dark');
})();
</script>
</head>
<body>

<header>
  <div class="header-left">
    <button class="btn-back" onclick="location.href='index.html'">← 戻る</button>
    <h1>🔩 配管点検表</h1>
  </div>
  <div class="header-right">
    <span id="progress-text">0 / 22</span>
    <div class="progress-bar-wrap"><div id="progress-bar"></div></div>
  </div>
</header>
<button id="theme-btn" onclick="toggleTheme()" style="position:fixed;top:10px;right:12px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.4);color:#fff;border-radius:6px;padding:6px 10px;font-size:18px;cursor:pointer;line-height:1;z-index:9999;">🌙</button>

<!-- ダイヤルピッカーモーダル -->
<div class="dial-modal-overlay" id="dial-overlay" onclick="dialOverlayClick(event)">
  <div class="dial-modal">
    <div class="dial-modal-header">
      <span class="dial-modal-title">点検者を選択</span>
      <button class="dial-modal-done" onclick="closeDial()">完了</button>
    </div>
    <div class="dial-scroll-area">
      <div class="dial-selector-line"></div>
      <div class="dial-list" id="dial-list"></div>
    </div>
  </div>
</div>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="main">
    <div class="welcome">
      <div class="icon">🔩</div>
      <p>左のメニューから点検する配管を選んでください</p>
    </div>
  </main>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbww9ISmeHo-cbwlfwVTHOsP2eHacHIprniNiK5Q-nem-OL2QDlqnkv5csipdReeRYSs1w/exec';

// ===== 配管データ =====
const PIPINGS = [
  { no: 1,  name: '脱臭配管',             from: '汚泥洗浄設備、脱水機',       to: '既設600Φ脱臭配管',         type: 'U-PVC ダクト管', size: '300、150、100、75、50A' },
  { no: 2,  name: '洗浄汚泥移送配管',     from: '汚泥洗浄槽',                 to: 'スクリーン',                type: 'U-PVC VP',       size: '50A' },
  { no: 3,  name: '洗浄水移送配管',       from: '一次・二次洗浄水貯留槽',     to: '汚泥洗浄槽、集水桝',       type: 'U-PVC VP',       size: '65A' },
  { no: 4,  name: '工水配管',             from: '既設工水配管',               to: '汚泥洗浄設備、脱水機',     type: 'U-PVC VP',       size: '50、30、25A' },
  { no: 5,  name: 'スクリーンろ液移送配管', from: 'スクリーンろ液タンク',     to: '凝集槽A',                   type: 'U-PVC VP',       size: '40A' },
  { no: 6,  name: '冷却水移送配管',       from: 'ろ過槽',                     to: '復水器',                    type: 'U-PVC VP',       size: '50A' },
  { no: 7,  name: '冷却水返送配管1',      from: '復水タンク',                 to: 'ろ過槽',                    type: 'U-PVC VP',       size: '50A' },
  { no: 8,  name: '冷却水返送配管2',      from: '復水タンク',                 to: '混合槽',                    type: 'U-PVC VP',       size: '50A' },
  { no: 9,  name: 'LPG供給配管',          from: 'バルクタンク',               to: '高圧蒸気ボイラ',            type: 'SGP',            size: '25A' },
  { no: 10, name: '脱水ろ液移送配管',     from: '脱水機',                     to: '一次洗浄水貯留槽、集水桝', type: 'U-PVC VU',       size: '65A', note: '自然流下' },
  { no: 11, name: 'ろ布洗浄水移送配管',   from: '脱水機',                     to: '二次洗浄水貯留槽',          type: 'U-PVC VU',       size: '40A', note: '自然流下' },
  { no: 12, name: '復水配管',             from: '復水器',                     to: '復水タンク',                type: 'U-PVC',          size: '150、100A', note: '自然流下' },
  { no: 13, name: 'スチームドレン配管',   from: '乾燥機',                     to: '二次洗浄水貯留槽',          type: 'SGP',            size: '40A' },
  { no: 14, name: '市水配管',             from: '既設市水配管',               to: '給水タンク',                type: 'HI-PVC VP',      size: '50、40A' },
  { no: 15, name: 'ボイラースチーム配管', from: '高圧蒸気ボイラ',             to: '乾燥機',                    type: 'SGP',            size: '32A', note: '保温材' },
  { no: 16, name: 'ボイラーブロー配管',   from: '高圧蒸気ボイラ',             to: '集水桝',                    type: 'SGP',            size: '50A', note: '自然流下' },
  { no: 17, name: '軟水装置排水配管',     from: '軟水装置',                   to: '集水桝',                    type: 'SGP',            size: '25A', note: '自然流下' },
  { no: 18, name: '給水タンクオーバーフロー管', from: '給水タンク',           to: '集水桝',                    type: 'U-PVC VU',       size: '25A', note: '自然流下' },
  { no: 19, name: 'カチオン添加配管',     from: 'カチオン貯槽',               to: '凝集槽A、凝集槽B',          type: 'U-PVC VP',       size: '25A', note: '循環ホース' },
  { no: 20, name: '集水桝移送配管',       from: '集水桝',                     to: '受ピット',                  type: 'U-PVC VP',       size: '100、75、65、50A', note: 'ルート途中不要配管使用' },
  { no: 21, name: '再生油添加配管',       from: '再生油貯留タンク',           to: '混練機',                    type: 'ホース',         size: '8A', note: '保温材' },
  { no: 22, name: '空送配管',             from: '空送ブロワ',                 to: 'サイクロン',                type: 'U-PVC C-PVC SGP', size: '30、32A' },
];

// ===== State =====
const sentResults = {}; // 送信済み
const tempResults = {}; // 一時保存済み（未送信）
const results     = {}; // フォーム表示用（sent優先、なければtemp）
let activeNo = null;
const totalCount = PIPINGS.length;
const mediaFiles = [];

// ===== シフト判定 =====
function getCurrentShift() {
  const h = new Date().getHours();
  if (h < 7)  return '夜勤（0:00〜6:59）';
  if (h < 15) return '日勤（7:00〜14:59）';
  return '準夜（15:00〜23:59）';
}

// ===== localStorageキー =====
function getStorageKey(no, type) {
  const today = new Date().toISOString().slice(0, 10);
  const shift = getCurrentShift();
  return `piping_${type}_${today}_${shift}_${no}`;
}

// ===== localStorage から復元 =====
function restoreFromLocalStorage() {
  PIPINGS.forEach(p => {
    const sentData = localStorage.getItem(getStorageKey(p.no, 'sent'));
    const tempData = localStorage.getItem(getStorageKey(p.no, 'temp'));
    if (sentData) { sentResults[p.no] = JSON.parse(sentData); results[p.no] = JSON.parse(sentData); }
    else if (tempData) { tempResults[p.no] = JSON.parse(tempData); results[p.no] = JSON.parse(tempData); }
  });
}

// ===== index.html用フラグ保存 =====
function saveIndexFlag() {
  const today = new Date().toISOString().slice(0, 10);
  const shift = getCurrentShift();
  const key = `piping_inspection_${today}_${shift}`;
  localStorage.setItem(key, JSON.stringify({ done: Object.keys(sentResults).length, total: totalCount, ts: Date.now() }));
}

// ===== サイドバー生成 =====
function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '';
  PIPINGS.forEach(p => {
    const item = document.createElement('div');
    item.className = 'device-item';
    item.dataset.no = p.no;
    const sent = sentResults[p.no];
    const temp = tempResults[p.no];
    let dotClass = '', badgeHTML = '';
    if (sent) {
      const isNG = hasNG(sent);
      dotClass  = isNG ? 'ng' : 'ok';
      badgeHTML = `<span class="done-badge ${isNG ? 'ng' : 'ok'}">${isNG ? '⚠ 異常' : '✅ 点検済'}</span>`;
    } else if (temp) {
      dotClass  = 'temp';
      badgeHTML = `<span class="done-badge temp">📝 入力中</span>`;
    }
    item.innerHTML = `
      <span class="status-dot ${dotClass}" id="dot-${p.no}"></span>
      <span class="device-name">No.${p.no} ${p.name}</span>
      <span id="badge-${p.no}">${badgeHTML}</span>
      <span class="no-badge">${p.size}</span>
    `;
    item.addEventListener('click', () => showForm(p));
    sidebar.appendChild(item);
  });
}

function hasNG(r) {
  return Object.values(r.items || {}).some(v => v === '異常あり' || v === '要注意');
}

// ===== 進捗更新（送信済み件数） =====
function updateProgress() {
  const done = Object.keys(sentResults).length;
  document.getElementById('progress-text').textContent = `${done} / ${totalCount}`;
  document.getElementById('progress-bar').style.width = `${(done / totalCount) * 100}%`;
}

// ===== 保存済みデータに異常があるか判定 =====
function hasAnyAbnormal(saved) {
  if (!saved || !saved.items) return false;
  return Object.values(saved.items).some(v => v === '要注意' || v === '異常あり');
}

// ===== 目視結果に応じて備考・画像を表示切替 =====
function checkAllNormal() {
  const extra = document.getElementById('extra-section');
  if (!extra) return;
  const checked = document.querySelector('input[name="item-目視"]:checked');
  const isAbnormal = checked && (checked.value === '要注意' || checked.value === '異常あり');
  extra.style.display = isAbnormal ? '' : 'none';
}

// ===== メディア管理 =====
function addMedia(input, type) {
  Array.from(input.files).forEach(file => {
    if (type === 'video') {
      const video = document.createElement('video');
      const url = URL.createObjectURL(file);
      video.src = url;
      video.onloadedmetadata = () => {
        if (video.duration > 5) { alert('動画は5秒以内にしてください（' + video.duration.toFixed(1) + '秒）'); URL.revokeObjectURL(url); return; }
        mediaFiles.push({ file, type, url });
        renderMediaPreview();
      };
    } else {
      const url = URL.createObjectURL(file);
      mediaFiles.push({ file, type, url });
      renderMediaPreview();
    }
  });
  input.value = '';
}

function renderMediaPreview() {
  const preview = document.getElementById('media-preview');
  const count = document.getElementById('media-count');
  if (!preview) return;
  preview.innerHTML = mediaFiles.map((m, i) => `
    <div class="media-thumb">
      ${m.type === 'image' ? `<img src="${m.url}">` : `<video src="${m.url}" muted playsinline></video>`}
      <button class="del-btn" onclick="removeMedia(${i})">×</button>
    </div>
  `).join('');
  if (count) count.textContent = mediaFiles.length > 0 ? `${mediaFiles.length}件追加済み` : '';
}

function removeMedia(i) {
  URL.revokeObjectURL(mediaFiles[i].url);
  mediaFiles.splice(i, 1);
  renderMediaPreview();
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ===== 送信処理 =====
async function submitForm(no) {
  const p = PIPINGS.find(x => x.no === no);
  const date      = document.getElementById('f-date').value;
  const time      = document.getElementById('f-time').value;
  const submitter = document.getElementById('f-submitter').value.trim();
  const shift     = document.getElementById('f-shift').value;
  const note      = document.getElementById('f-note')?.value.trim() || '';
  const msg       = document.getElementById('submit-msg');
  const btn       = document.getElementById('btn-submit');

  if (!submitter) { msg.textContent = '点検者名を入力してください'; msg.className = 'submit-msg err'; return; }

  const checked = document.querySelector('input[name="item-目視"]:checked');
  if (!checked) { msg.textContent = '目視の結果を選択してください'; msg.className = 'submit-msg err'; return; }

  const items = { '目視': checked.value };
  const data  = { date, time, shift, submitter, items, note, pipeName: p.name };

  btn.disabled = true;
  msg.textContent = '送信中...';
  msg.className = 'submit-msg';

  const mediaData = [];
  for (const m of mediaFiles) {
    const base64 = await fileToBase64(m.file);
    mediaData.push({ name: m.file.name, type: m.type, mimeType: m.file.type, data: base64 });
  }

  const payload = {
    sheetName: '配管点検記録',
    date, time, shift, submitter,
    pipeNo: p.no, pipeName: p.name,
    items, note, media: mediaData
  };

  try {
    const res  = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
    const json = await res.json();
    if (json.status === 'ok') {
      msg.textContent = '✔ 送信しました';
      msg.className = 'submit-msg ok';
      mediaFiles.length = 0;
      renderMediaPreview();
      sentResults[no] = data;
      results[no]     = data;
      delete tempResults[no];
      localStorage.setItem(getStorageKey(no, 'sent'), JSON.stringify(data));
      localStorage.removeItem(getStorageKey(no, 'temp'));
      updateSidebarBadge(no);
      updateProgress();
      saveIndexFlag();
    } else {
      throw new Error(json.message || 'エラー');
    }
  } catch(e) {
    msg.textContent = '送信エラー: ' + e.message;
    msg.className = 'submit-msg err';
  }
  btn.disabled = false;
}

// ===== 点検者リスト =====
const INSPECTORS = ['大平', '坂本'];

// ===== ダイヤルピッカー =====
const ITEM_H = 44;
const PADDING = 3;
let dialTargetId = null;
let dialIndex = 0;
let dialStartY = 0;
let dialStartOffset = 0;
let dialOffset = 0;
let dialDragging = false;

function buildDialList() {
  const list = document.getElementById('dial-list');
  if (!list) return;
  const items = [...Array(PADDING).fill(''), ...INSPECTORS, ...Array(PADDING).fill('')];
  list.style.top = `${(200 / 2) - (ITEM_H / 2) - PADDING * ITEM_H}px`;
  list.innerHTML = items.map((name, i) => `<div class="dial-item" data-idx="${i - PADDING}">${name}</div>`).join('');
  applyDialTransform(0);
  attachDialEvents();
}

function applyDialTransform(offset) {
  dialOffset = Math.max(-(INSPECTORS.length - 1) * ITEM_H, Math.min(0, offset));
  const list = document.getElementById('dial-list');
  if (list) list.style.transform = `translateY(${dialOffset}px)`;
  dialIndex = Math.max(0, Math.min(INSPECTORS.length - 1, Math.round(-dialOffset / ITEM_H)));
  document.querySelectorAll('.dial-item').forEach(el => {
    el.classList.toggle('selected', parseInt(el.dataset.idx) === dialIndex);
  });
}

function snapDial() { applyDialTransform(-dialIndex * ITEM_H); }

function attachDialEvents() {
  const list = document.getElementById('dial-list');
  if (!list) return;
  list.addEventListener('touchstart', e => { dialDragging = true; dialStartY = e.touches[0].clientY; dialStartOffset = dialOffset; }, { passive: true });
  list.addEventListener('touchmove',  e => { if (dialDragging) applyDialTransform(dialStartOffset + e.touches[0].clientY - dialStartY); }, { passive: true });
  list.addEventListener('touchend',   () => { dialDragging = false; snapDial(); });
  list.addEventListener('mousedown',  e => { dialDragging = true; dialStartY = e.clientY; dialStartOffset = dialOffset; });
  window.addEventListener('mousemove',e => { if (dialDragging) applyDialTransform(dialStartOffset + e.clientY - dialStartY); });
  window.addEventListener('mouseup',  () => { if (dialDragging) { dialDragging = false; snapDial(); } });
}

function openDial(targetId) {
  dialTargetId = targetId;
  const currentVal = document.getElementById(targetId)?.value;
  const idx = INSPECTORS.indexOf(currentVal);
  buildDialList();
  applyDialTransform(idx >= 0 ? -idx * ITEM_H : 0);
  snapDial();
  document.getElementById('dial-overlay').classList.add('open');
}

function closeDial() {
  const selected = INSPECTORS[dialIndex] || '';
  if (dialTargetId) {
    const hidden = document.getElementById(dialTargetId);
    const label  = document.getElementById(dialTargetId + '-label');
    if (hidden) hidden.value = selected;
    if (label)  label.textContent = selected || '選択してください';
  }
  document.getElementById('dial-overlay').classList.remove('open');
}

function dialOverlayClick(e) {
  if (e.target === document.getElementById('dial-overlay')) closeDial();
}

// ===== ダークモード =====
function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const newTheme = isDark ? 'light' : 'dark';
  applyTheme(newTheme);
  localStorage.setItem('theme', newTheme);
}
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'dark' : '');
  const btn = document.getElementById('theme-btn');
  if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
}
(function() {
  const saved = localStorage.getItem('theme') || 'light';
  applyTheme(saved);
})();
</script>

<script>
// ===== スワイプで点検表切り替え =====
(function() {
  const PREV = 'inspection_app.html';
  const NEXT = 'boiler_daily.html';
  const THRESHOLD  = 80;   // スワイプ判定距離（px）
  const MAX_VERTICAL = 60; // 縦スクロールとの誤検知防止（px）

  let startX = 0, startY = 0, startTime = 0;

  document.addEventListener('touchstart', function(e) {
    startX    = e.touches[0].clientX;
    startY    = e.touches[0].clientY;
    startTime = Date.now();
  }, { passive: true });

  document.addEventListener('touchend', function(e) {
    const dx   = e.changedTouches[0].clientX - startX;
    const dy   = e.changedTouches[0].clientY - startY;
    const dt   = Date.now() - startTime;

    // 縦スクロールと判定、または時間が長すぎる場合は無視
    if (Math.abs(dy) > MAX_VERTICAL) return;
    if (dt > 600) return;
    if (Math.abs(dx) < THRESHOLD) return;

    if (dx > 0) {
      // 右スワイプ → 次へ
      window.location.href = NEXT;
    } else {
      // 左スワイプ → 前へ
      window.location.href = PREV;
    }
  }, { passive: true });
})();
</script>
