<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>設備点検システム</title>
<style>
  :root {
    --primary: #1a5276;
    --primary-light: #2980b9;
    --accent: #27ae60;
    --warn: #e67e22;
    --danger: #c0392b;
    --bg: #f0f4f8;
    --surface: #ffffff;
    --border: #d0dae6;
    --text: #1c2833;
    --muted: #5d6d7e;
    --sidebar-w: 260px;
    --bg2: #eef2f7;
    --bg3: #f8fafc;
    --hover-bg: #eef6ff;
    --active-bg: #d6eaf8;
    --tag-bg: #eef2f7;
    --group-bg: #eef2f7;
    --media-bg: #f0f4f8;
    --input-bg: #ffffff;
  }
  [data-theme="dark"] {
    --primary: #1a6a9a;
    --primary-light: #3498db;
    --accent: #2ecc71;
    --warn: #e67e22;
    --danger: #e74c3c;
    --bg: #0f1923;
    --surface: #1a2535;
    --border: #2c3e55;
    --text: #e8f0f8;
    --muted: #7a9ab8;
    --bg2: #162030;
    --bg3: #1e2d40;
    --hover-bg: #1e3248;
    --active-bg: #1a3a5c;
    --tag-bg: #162030;
    --group-bg: #162030;
    --media-bg: #162030;
    --input-bg: #1e2d40;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; transition: background 0.2s, color 0.2s; }

  /* ===== HEADER ===== */
  header {
    background: var(--primary);
    color: #fff;
    padding: 0 16px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }
  header h1 { font-size: 16px; font-weight: 700; letter-spacing: 0.05em; }
  .header-right { display: flex; align-items: center; gap: 12px; font-size: 13px; }
  #progress-text { opacity: 0.85; }
  .progress-bar-wrap { width: 140px; height: 8px; background: rgba(255,255,255,0.25); border-radius: 4px; overflow: hidden; }
  #progress-bar { height: 100%; background: #2ecc71; border-radius: 4px; transition: width 0.4s; width: 0%; }

  /* ===== LAYOUT ===== */
  .layout { display: flex; margin-top: 52px; min-height: calc(100vh - 52px); }

  /* ===== SIDEBAR ===== */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    position: fixed;
    top: 52px; left: 0; bottom: 0;
    overflow-y: auto;
    padding: 8px 0;
  }
  .sidebar-group { margin-bottom: 4px; }
  .group-header {
    padding: 8px 14px;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: var(--group-bg);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    user-select: none;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .group-header .arrow { transition: transform 0.2s; font-size: 10px; }
  .group-header.collapsed .arrow { transform: rotate(-90deg); }
  .group-items { overflow: hidden; }
  .group-items.collapsed { display: none; }
  .device-item {
    padding: 9px 14px 9px 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .device-item:hover { background: var(--hover-bg); }
  .device-item.active { background: var(--active-bg); border-left: 3px solid var(--primary-light); padding-left: 17px; }
  .device-name { font-size: 13px; flex: 1; }
  .tag-badge {
    font-size: 10px;
    color: var(--muted);
    background: var(--group-bg);
    border-radius: 3px;
    padding: 1px 5px;
    flex-shrink: 0;
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    background: #d0dae6;
  }
  .status-dot.ok { background: var(--accent); }
  .status-dot.ng { background: var(--danger); }
  .status-dot.temp { background: #e67e22; }

  /* ===== 点検済バッジ ===== */
  .done-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 8px;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .done-badge.ok   { background: #d5f5e3; color: #1e8449; border: 1px solid #27ae60; }
  .done-badge.ng   { background: #fdedec; color: #c0392b; border: 1px solid #c0392b; }
  .done-badge.temp { background: #fef9e7; color: #d68910; border: 1px solid #e67e22; }

  /* ===== MAIN ===== */
  .main {
    margin-left: var(--sidebar-w);
    flex: 1;
    padding: 24px 20px 40px;
  }
  .welcome {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 400px; color: var(--muted); text-align: center; gap: 12px;
  }
  .welcome .icon { font-size: 48px; opacity: 0.4; }
  .welcome p { font-size: 15px; }

  /* ===== FORM CARD ===== */
  .form-card {
    background: var(--surface);
    border-radius: 8px;
    border: 1px solid var(--border);
    overflow: hidden;
    max-width: 680px;
  }
  .form-header {
    background: var(--primary);
    color: #fff;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .form-header .tag { font-size: 11px; background: rgba(255,255,255,0.25); padding: 3px 8px; border-radius: 4px; }
  .form-header h2 { font-size: 16px; }
  .form-body { padding: 20px; display: flex; flex-direction: column; gap: 16px; }

  /* 点検者 */
  .field-row { display: flex; flex-direction: column; gap: 6px; }
  .field-label { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .field-row input[type=text],
  .field-row input[type=date],
  .field-row textarea,
  .field-row select {
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 8px 10px;
    font-size: 14px;
    font-family: inherit;
    width: 100%;
    background: var(--input-bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s, background 0.2s, color 0.2s;
  }
  .field-row input:focus, .field-row textarea:focus, .field-row select:focus {
    border-color: var(--primary-light);
  }

  /* ===== ダイヤルピッカー ===== */
  .dial-picker-wrap { position: relative; }
  .dial-display {
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 8px 10px;
    font-size: 14px;
    background: var(--input-bg);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    user-select: none;
    transition: border-color 0.15s;
  }
  .dial-display:hover { border-color: var(--primary-light); }
  .dial-display .dial-arrow { color: var(--muted); font-size: 12px; }

  .dial-modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .dial-modal-overlay.open { display: flex; }

  .dial-modal {
    background: var(--input-bg);
    border-radius: 16px 16px 0 0;
    max-height: 80vh;
    width: 100%;
    max-width: 520px;
    padding-bottom: env(safe-area-inset-bottom, 0);
    overflow: hidden;
  }
  .dial-modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .dial-modal-title { font-size: 14px; font-weight: 700; color: var(--text); }
  .dial-modal-done {
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 6px 16px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }

  .dial-scroll-area {
    position: relative;
    overflow: hidden;
  }
  /* 上下グラデーションで奥行き感 */
  .dial-scroll-area::before,
  .dial-scroll-area::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 70px;
    z-index: 2;
    pointer-events: none;
  }
  .dial-scroll-area::before {
    top: 0;
    background: linear-gradient(to bottom, var(--surface), transparent);
  }
  .dial-scroll-area::after {
    bottom: 0;
    background: linear-gradient(to top, var(--surface), transparent);
  }
  /* 選択枠 */
  .dial-selector-line {
    position: absolute;
    left: 20px; right: 20px;
    top: 0; transform: none;
    height: 44px;
    border-top: 2px solid var(--primary-light);
    border-bottom: 2px solid var(--primary-light);
    border-radius: 4px;
    z-index: 1;
    pointer-events: none;
  }
  .dial-list {
    position: absolute;
    left: 0; right: 0;
    top: 0;
    cursor: grab;
    touch-action: none;
  }
  .dial-list:active { cursor: grabbing; }
  .dial-item {
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 600;
    color: var(--muted);
    transition: color 0.15s, font-size 0.15s;
    user-select: none;
  }
  .dial-item.selected {
    color: var(--text);
    font-size: 20px;
  }

  /* ===== 点検項目グリッド ===== */
  .inspection-grid { display: grid; gap: 10px; }
  .inspection-item {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .inspection-label { font-size: 14px; font-weight: 600; flex: 0 0 80px; }
  .radio-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .radio-group label {
    display: flex; align-items: center; gap: 5px; cursor: pointer;
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 13px;
    transition: all 0.15s;
    user-select: none;
  }
  .radio-group input[type=radio] { display: none; }
  .radio-group input[type=radio]:checked + span { font-weight: 700; }
  .radio-group label:has(input[value="異常なし"]:checked) { background: #d5f5e3; border-color: var(--accent); color: #1e8449; }
  .radio-group label:has(input[value="要注意"]:checked) { background: #fef9e7; border-color: var(--warn); color: #d68910; }
  .radio-group label:has(input[value="異常あり"]:checked) { background: #fdedec; border-color: var(--danger); color: var(--danger); }
  .radio-group label:has(input[value="該当なし"]:checked) { background: var(--group-bg); border-color: #aab; color: var(--muted); }

  /* ===== 修理必要ボタン ===== */
  .btn-repair-needed {
    display: flex; align-items: center; gap: 4px;
    padding: 5px 12px;
    border: 2px solid #7d3c98;
    border-radius: 20px;
    font-size: 13px;
    font-family: inherit;
    font-weight: 700;
    color: #7d3c98;
    background: var(--input-bg);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .btn-repair-needed.active {
    background: #7d3c98;
    color: #fff;
    border-color: #7d3c98;
  }
  .btn-repair-needed::before { content: '🔧'; font-size: 12px; }

  /* ===== 修理依頼書情報エリア ===== */
  .repair-info-section {
    background: #f5eef8;
    border: 2px solid #7d3c98;
    border-radius: 8px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .repair-info-title {
    font-size: 12px;
    font-weight: 700;
    color: #7d3c98;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* 構成機器表示（パターンC） */
  .sub-components {
    background: var(--media-bg);
    border-radius: 5px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--muted);
    border: 1px dashed var(--border);
  }
  .sub-components strong { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; color: var(--muted); }
  .sub-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .sub-tag {
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 9px;
    font-size: 12px;
  }

  /* 備考 */
  .field-row textarea { resize: vertical; min-height: 64px; }

  /* ===== メディアアップロード ===== */
  .media-area {
    background: var(--media-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
  }
  .media-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .media-btns button {
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 14px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
  }
  .media-btns button:active { background: var(--primary); color: #fff; }
  .media-preview {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .media-thumb {
    position: relative;
    width: 80px;
    height: 80px;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: #000;
  }
  .media-thumb img, .media-thumb video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .media-thumb .del-btn {
    position: absolute;
    top: 2px;
    right: 2px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .media-count { font-size: 12px; color: var(--muted); margin-top: 6px; }

  /* ===== 定型文パレット ===== */
  .preset-palette {
    background: #f0f4f8;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 8px;
  }
  .preset-group-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .preset-btns {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .preset-btns button {
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 5px 12px;
    font-size: 12px;
    font-family: inherit;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .preset-btns button:active {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }

  /* ===== SUBMIT ===== */
  .form-footer {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .btn-submit {
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  .btn-submit:hover { background: var(--primary-light); }
  .btn-submit:disabled { background: #aaa; cursor: not-allowed; }
  .btn-temp-save {
    background: var(--input-bg);
    color: var(--primary);
    border: 2px solid var(--primary);
    border-radius: 6px;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .btn-temp-save:hover { background: var(--hover-bg); }
  .btn-temp-save:disabled { opacity: 0.4; cursor: not-allowed; }
  .submit-msg { font-size: 13px; }
  .submit-msg.ok { color: var(--accent); }
  .submit-msg.err { color: var(--danger); }

  /* ===== MOBILE ===== */
  @media (max-width: 700px) {
    :root { --sidebar-w: 100%; }
    .sidebar {
      position: static;
      width: 100%;
      height: auto;
      max-height: calc(100vh - 52px);
      border-right: none;
      border-bottom: 1px solid var(--border);
      overflow-y: auto;
    }
    /* フォーム未表示時はサイドバーを全画面 */
    .layout:not(.has-form) .sidebar { max-height: calc(100vh - 52px); }
    .layout { flex-direction: column; }
    .main { margin-left: 0; padding: 12px; }
    .main:not(.active) .form-card { display: none; }
    .header-right .progress-bar-wrap { width: 80px; }
    /* スマホでもウェルカム画面を表示（機器未選択時） */
    /* フォームが表示されているときはサイドバーを縮小 */
    .sidebar.has-form {
      max-height: 200px;
    }
  }
</style>
<script>
(function(){
  var t = localStorage.getItem('theme') || 'light';
  if(t === 'dark') document.documentElement.setAttribute('data-theme','dark');
})();
</script>
</head>
<body>

<!-- ===== HEADER ===== -->
<header>
  <div class="header-left" style="display:flex;align-items:center;gap:10px;">
    <button onclick="location.href='index.html'" style="background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);color:#fff;border-radius:5px;padding:5px 10px;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap;">← 戻る</button>
    <h1 style="white-space:nowrap;font-size:clamp(13px,3vw,18px);">🔧 機器点検表</h1>
  </div>
  <div class="header-right">
    <span id="progress-text">0 / 44</span>
    <div class="progress-bar-wrap"><div id="progress-bar"></div></div>
    <button id="theme-btn" onclick="toggleTheme()" style="background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.4);color:#fff;border-radius:5px;padding:5px 10px;font-size:16px;cursor:pointer;line-height:1;">🌙</button>
  </div>
</header>

<!-- ダイヤルピッカーモーダル -->
<div class="dial-modal-overlay" id="dial-overlay" onclick="dialOverlayClick(event)">
  <div class="dial-modal">
    <div class="dial-modal-header">
      <span class="dial-modal-title">点検者を選択</span>
      <button class="dial-modal-done" onclick="closeDial()">完了</button>
    </div>
    <div class="dial-scroll-area">
      <div class="dial-selector-line"></div>
      <div class="dial-list" id="dial-list"></div>
    </div>
  </div>
</div>

<!-- ===== LAYOUT ===== -->
<div class="layout">

  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar"></nav>

  <!-- MAIN -->
  <main class="main" id="main">
    <div class="welcome">
      <div class="icon">🔧</div>
      <p>点検する機器を選んでください</p>
      <button onclick="openSidebar()" style="margin-top:16px;background:var(--primary);color:#fff;border:none;border-radius:8px;padding:12px 28px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;">🔍 機器を選ぶ</button>
    </div>
  </main>

</div>

<script>
// ===== GAS URL（デプロイ後に書き換え） =====
const GAS_URL = 'https://script.google.com/macros/s/AKfycbww9ISmeHo-cbwlfwVTHOsP2eHacHIprniNiK5Q-nem-OL2QDlqnkv5csipdReeRYSs1w/exec';

// ===== 機器データ =====
const GROUPS = [
  {
    name: '汚泥洗浄設備',
    devices: [
      { tag: 'V-001',  name: '汚泥洗浄槽',              pattern: 'E' },
      { tag: 'A-001A', name: '汚泥洗浄槽 撹拌機A',      pattern: 'A' },
      { tag: 'A-001B', name: '汚泥洗浄槽 撹拌機B',      pattern: 'A' },
      { tag: 'A-001C', name: '汚泥洗浄槽 撹拌機C',      pattern: 'A' },
      { tag: 'P-001',  name: '汚泥洗浄槽 揚水ポンプ',    pattern: 'B' },
      { tag: 'V-002',  name: '一次洗浄水貯留槽',          pattern: 'E' },
      { tag: 'A-002A', name: '一次洗浄水貯留槽 撹拌機A', pattern: 'A' },
      { tag: 'A-002B', name: '一次洗浄水貯留槽 撹拌機B', pattern: 'A' },
      { tag: 'P-002',  name: '一次洗浄水貯留槽 揚水ポンプ', pattern: 'B' },
      { tag: 'V-003',  name: '二次洗浄水貯留槽',           pattern: 'E' },
      { tag: 'A-003',  name: '二次洗浄水貯留槽 撹拌機',  pattern: 'A' },
      { tag: 'P-003',  name: '二次洗浄水貯留槽 揚水ポンプ', pattern: 'B' },
    ]

  B: ['異音', '振動', '揚水状況'],
  C: ['目視', '異臭', '異音', '振動'],

};

// ===== シフト判定 =====
function getCurrentShift() {
  const h = new Date().getHours();
  if (h < 7)  return '夜勤（0:00〜6:59）';
  if (h < 15) return '日勤（7:00〜14:59）';
  return '準夜（15:00〜23:59）';
}

// ===== サイドバー生成 =====
function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '';
  GROUPS.forEach((g, gi) => {
    const grp = document.createElement('div');
    grp.className = 'sidebar-group';

    const hdr = document.createElement('div');
    hdr.className = 'group-header';
    hdr.innerHTML = `<span>${g.name}</span><span class="arrow">▼</span>`;
    hdr.addEventListener('click', () => {
      hdr.classList.toggle('collapsed');
      items.classList.toggle('collapsed');
    });

    const items = document.createElement('div');
    items.className = 'group-items';

    g.devices.forEach(dev => {
      const item = document.createElement('div');
      item.className = 'device-item';
      item.dataset.tag = dev.tag;
      const sent = sentResults[dev.tag];
      const temp = tempResults[dev.tag];
      let dotClass  = '';
      let badgeHTML = '';
      if (sent) {
        const isNG = hasNG(sent);
        dotClass  = isNG ? 'ng' : 'ok';
        badgeHTML = `<span class="done-badge ${isNG ? 'ng' : 'ok'}">${isNG ? '⚠ 異常' : '✅ 点検済'}</span>`;
      } else if (temp) {
        dotClass  = 'temp';
        badgeHTML = `<span class="done-badge temp">📝 入力中</span>`;
      }
      item.innerHTML = `
        <span class="status-dot ${dotClass}" id="dot-${dev.tag}"></span>
        <span class="device-name">${dev.name}</span>
        <span id="badge-${dev.tag}">${badgeHTML}</span>
        <span class="tag-badge">${dev.tag}</span>
      `;
      item.addEventListener('click', () => showForm(dev));
      items.appendChild(item);
    });

    grp.appendChild(hdr);
    grp.appendChild(items);
    sidebar.appendChild(grp);
  });
}

function hasNG(r) {
  return Object.values(r.items || {}).some(v => v === '異常あり' || v === '要注意');
}

const repairItems = {};

function toggleRepair(itemKey) {
  repairItems[itemKey] = !repairItems[itemKey];
  const btn = document.getElementById('repair-btn-' + itemKey);
  if (btn) btn.classList.toggle('active', repairItems[itemKey]);

function updateRepairSection() {

// ===== メディア管理 =====
const mediaFiles = []; // {file, type, url}

function addMedia(input, type) {
  const files = Array.from(input.files);
  files.forEach(file => {
    if (type === 'video') {
      // 動画の長さチェック
      const video = document.createElement('video');
      const url = URL.createObjectURL(file);
      video.src = url;
      video.onloadedmetadata = () => {
        if (video.duration > 5) {
          alert('動画は5秒以内にしてください（' + video.duration.toFixed(1) + '秒）');
          URL.revokeObjectURL(url);
          return;
        }
        mediaFiles.push({ file, type, url });
        renderMediaPreview();
      };
    } else {
      const url = URL.createObjectURL(file);
      mediaFiles.push({ file, type, url });
      renderMediaPreview();
    }
  });
  input.value = '';
}

function renderMediaPreview() {
  const preview = document.getElementById('media-preview');
  const count = document.getElementById('media-count');
  if (!preview) return;
  preview.innerHTML = mediaFiles.map((m, i) => `
    <div class="media-thumb">
      ${m.type === 'image'
        ? `<img src="${m.url}">`
        : `<video src="${m.url}" muted playsinline></video>`}
      <button class="del-btn" onclick="removeMedia(${i})">×</button>
    </div>
  `).join('');
  count.textContent = mediaFiles.length > 0 ? `${mediaFiles.length}件追加済み` : '';
}

function removeMedia(i) {
  URL.revokeObjectURL(mediaFiles[i].url);
  mediaFiles.splice(i, 1);
  renderMediaPreview();
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ===== 送信処理 =====
async function submitForm(tag) {
  const dev = allDevices.find(d => d.tag === tag);
  const date = document.getElementById('f-date').value;
  const time = document.getElementById('f-time').value;
  const submitter = document.getElementById('f-submitter').value.trim();
  const note = document.getElementById('f-note')?.value.trim() || '';
  const msg = document.getElementById('submit-msg');
  const btn = document.getElementById('btn-submit');

  if (!submitter) {
    msg.textContent = '点検者名を入力してください';
    msg.className = 'submit-msg err';
    return;
  }

  const items = {};
  PATTERNS[dev.pattern].forEach(item => {
    const checked = document.querySelector(`input[name="item-${item}"]:checked`);
    items[item] = checked ? checked.value : '';
  });

  const unchecked = PATTERNS[dev.pattern].filter(item => !items[item]);
  if (unchecked.length > 0) {
    msg.textContent = `未選択の項目があります：${unchecked.join('、')}`;
    msg.className = 'submit-msg err';
    return;
  }

  const requireRepair = Object.values(repairItems).some(v => v);
  const supervisor = document.getElementById('f-supervisor')?.value.trim() || '';

  if (requireRepair && !supervisor) {
    msg.textContent = '修理依頼書のため所属上司を選択してください';
    msg.className = 'submit-msg err';
    return;
  }

  // ローカル保存
  results[tag] = { date, time, submitter, items, note, requireRepair, supervisor, repairItems: { ...repairItems } };

  // GAS送信
  btn.disabled = true;
  msg.textContent = '送信中...';
  msg.className = 'submit-msg';

  // メディアをBase64に変換
  const mediaData = [];
  for (const m of mediaFiles) {
    const base64 = await fileToBase64(m.file);
    mediaData.push({
      name: m.file.name,
      type: m.type,
      mimeType: m.file.type,
      data: base64
    });
  }

  const payload = {
    sheetName: '機器点検記録',
    date,
    time,
    submitter,
    tag,
    deviceName: dev.name,
    pattern: dev.pattern,
    items,
    note,
    requireRepair,
    supervisor,
    repairItems: { ...repairItems },
    media: mediaData
  };

  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    });
    const json = await res.json();
    if (json.status === 'ok') {
      msg.textContent = '✔ 保存しました';
      msg.className = 'submit-msg ok';
      // メディアをリセット
      mediaFiles.length = 0;
      renderMediaPreview();
      // sentResultsに登録してlocalStorage保存・バッジ更新
      sentResults[tag] = results[tag];
      delete tempResults[tag];
      localStorage.setItem(getStorageKey(tag, 'sent'), JSON.stringify(results[tag]));
      localStorage.removeItem(getStorageKey(tag, 'temp'));
      updateSidebarBadge(tag);
      updateProgress();
      saveIndexFlag();
    } else {
      throw new Error(json.message || 'エラー');
    }
  } catch (e) {
    if (GAS_URL.includes('【ここに')) {
      msg.textContent = '✔ ローカル保存済み（GAS未設定）';
      msg.className = 'submit-msg ok';
    } else {
      msg.textContent = '送信エラー: ' + e.message;
      msg.className = 'submit-msg err';
    }
  }
  btn.disabled = false;
}

  const dotEl   = document.getElementById(`dot-${tag}`);
  let badgeHTML = '';
  let dotClass  = '';

  if (sent) {
    const isNG = hasNG(sent);
    badgeHTML = `<span class="done-badge ${isNG ? 'ng' : 'ok'}">${isNG ? '⚠ 異常' : '✅ 点検済'}</span>`;
    dotClass  = isNG ? 'ng' : 'ok';
  } else if (temp) {
    badgeHTML = `<span class="done-badge temp">📝 入力中</span>`;
    dotClass  = 'temp';
  }
  if (badgeEl) badgeEl.innerHTML = badgeHTML;
  if (dotEl)   dotEl.className = `status-dot ${dotClass}`;
}

// ===== 進捗更新（送信済み件数） =====
function updateProgress() {
  const done = Object.keys(sentResults).length;
  document.getElementById('progress-text').textContent = `${done} / ${totalCount}`;
  document.getElementById('progress-bar').style.width = `${(done / totalCount) * 100}%`;
}

// ===== localStorageキー =====
function getStorageKey(tag, type) {
  const today = new Date().toISOString().slice(0, 10);
  const shift = getCurrentShift();
  return `kiki_${type}_${today}_${shift}_${tag}`;
}

// ===== localStorage から復元 =====
function restoreFromLocalStorage() {
  allDevices.forEach(dev => {
    const sentKey = getStorageKey(dev.tag, 'sent');
    const tempKey = getStorageKey(dev.tag, 'temp');
    const sentData = localStorage.getItem(sentKey);
    const tempData = localStorage.getItem(tempKey);
    if (sentData) sentResults[dev.tag] = JSON.parse(sentData);
    if (tempData) tempResults[dev.tag] = JSON.parse(tempData);
    // sentとtempを results にマージ（フォーム表示用）
    if (sentData) results[dev.tag] = JSON.parse(sentData);
    else if (tempData) results[dev.tag] = JSON.parse(tempData);
  });
}

// ===== index.html用フラグ保存 =====
function saveIndexFlag() {
  const today = new Date().toISOString().slice(0, 10);
  const shift = getCurrentShift();
  const key   = `inspection_app_${today}_${shift}`;
  const allSent = Object.keys(sentResults).length === totalCount;
  localStorage.setItem(key, JSON.stringify({ done: Object.keys(sentResults).length, total: totalCount, allSent, ts: Date.now() }));
}

// ===== 一時保存処理 =====
function tempSaveForm(tag) {
  const dev = allDevices.find(d => d.tag === tag);
  const date      = document.getElementById('f-date').value;
  const time      = document.getElementById('f-time').value;
  const submitter = document.getElementById('f-submitter').value;
  const note      = document.getElementById('f-note')?.value.trim() || '';
  const msg       = document.getElementById('submit-msg');

  if (!submitter) { msg.textContent = '点検者名を入力してください'; msg.className = 'submit-msg err'; return; }

  const items = {};
  PATTERNS[dev.pattern].forEach(item => {
    const checked = document.querySelector(`input[name="item-${item}"]:checked`);
    items[item] = checked ? checked.value : '';
  });

  const data = { date, time, submitter, items, note, _temp: true };
  tempResults[tag] = data;
  results[tag]     = data;

  // localStorage保存
  localStorage.setItem(getStorageKey(tag, 'temp'), JSON.stringify(data));
  updateSidebarBadge(tag);
  updateProgress();
  saveIndexFlag();

  msg.textContent = '📝 一時保存しました';
  msg.className = 'submit-msg ok';
}

function downloadExcel() {
  const SHEET_ID = '1HGtBnIGyTMh7OAZz0ciDyJBeqF60fnDalP7ESDrDbhM';
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=xlsx&sheet=点検記録`;

// ===== 定型文挿入 =====
function insertPreset(text) {
  const ta = document.getElementById('f-note');
  if (!ta) return;
  const cur = ta.value;
  // 末尾に追記（既に内容があれば「、」で区切る）
  ta.value = cur ? cur + '、' + text : text;
  ta.focus();
}

// ===== 点検者リスト =====
// スプレッドシート「設定」シートC列（C2:C11）から取得
// 追加・変更はスプレッドシートのC列を編集するだけでOK（コード変更不要）
let INSPECTORS = ['大平　洋行', '坂本　貴志']; // フォールバック用（オフライン時）

async function loadInspectors() {
  try {
    const res = await fetch(`${GAS_URL}?action=getInspectors`);
    const data = await res.json();
    if (data.inspectors && data.inspectors.length > 0) {
      INSPECTORS = data.inspectors;
    }
  } catch (e) {
    // オフライン時はフォールバック値を使用
  }
}

// ===== ダイヤルピッカー =====
const ITEM_H = 44;       // 1アイテムの高さ
const PADDING = 0;       // 上下のパディング項目数
let dialTargetId = null;
let dialIndex = 0;
let dialStartY = 0;
let dialStartOffset = 0;
let dialOffset = 0;
let dialDragging = false;

function buildDialList(listData) {
  const list = document.getElementById('dial-list');
  if (!list) return;
  const items = [...Array(PADDING).fill(''), ...listData, ...Array(PADDING).fill('')];
  // scroll-area高さをアイテム数に応じて動的設定（最大5アイテム分）
  const visibleCount = Math.min(listData.length, 5);
  const areaH = visibleCount * ITEM_H;
  const scrollArea = list.closest('.dial-scroll-area');
  if (scrollArea) scrollArea.style.height = areaH + 'px';
  list.style.top = '0px';
  list.innerHTML = items.map((name, i) => {
    const realIdx = i - PADDING;
    return `<div class="dial-item" data-idx="${realIdx}">${name}</div>`;
  }).join('');
  applyDialTransform(0);
  attachDialEvents();
}

let dialList = []; // 現在ダイヤルに表示中のリスト

function applyDialTransform(offset) {
  dialOffset = offset;
  // 範囲制限
  const minOffset = -(dialList.length - 1) * ITEM_H;
  const maxOffset = 0;
  dialOffset = Math.max(minOffset, Math.min(maxOffset, dialOffset));

  const list = document.getElementById('dial-list');
  if (list) list.style.transform = `translateY(${dialOffset}px)`;

  // 選択中インデックス
  dialIndex = Math.round(-dialOffset / ITEM_H);
  dialIndex = Math.max(0, Math.min(dialList.length - 1, dialIndex));

  // selected クラス付け替え
  document.querySelectorAll('.dial-item').forEach(el => {
    const idx = parseInt(el.dataset.idx);
    el.classList.toggle('selected', idx === dialIndex);
  });
}

function snapDial() {
  applyDialTransform(-dialIndex * ITEM_H);
}

function attachDialEvents() {
  const list = document.getElementById('dial-list');
  if (!list) return;

  // タッチ
  list.addEventListener('touchstart', e => {
    dialDragging = true;
    dialStartY = e.touches[0].clientY;
    dialStartOffset = dialOffset;
  }, { passive: true });
  list.addEventListener('touchmove', e => {
    if (!dialDragging) return;
    const dy = e.touches[0].clientY - dialStartY;
    applyDialTransform(dialStartOffset + dy);
  }, { passive: true });
  list.addEventListener('touchend', () => {
    dialDragging = false;
    snapDial();
  });

  // マウス（PC確認用）
  list.addEventListener('mousedown', e => {
    dialDragging = true;
    dialStartY = e.clientY;
    dialStartOffset = dialOffset;
  });
  window.addEventListener('mousemove', e => {
    if (!dialDragging) return;
    const dy = e.clientY - dialStartY;
    applyDialTransform(dialStartOffset + dy);
  });
  window.addEventListener('mouseup', () => {
    if (dialDragging) { dialDragging = false; snapDial(); }
  });
}

async function openDial(targetId) {
  if (targetId === 'f-supervisor') {
    await loadSupervisors();
    dialList = SUPERVISORS.length > 0 ? SUPERVISORS : ['（未設定）'];
  } else {
    await loadInspectors();
    dialList = INSPECTORS;
  }
  dialTargetId = targetId;
  const currentVal = document.getElementById(targetId)?.value;
  const idx = dialList.indexOf(currentVal);
  buildDialList(dialList);
  applyDialTransform(idx >= 0 ? -idx * ITEM_H : 0);
  snapDial();
  document.getElementById('dial-overlay').classList.add('open');
}

function closeDial() {
  const selected = dialList[dialIndex] || '';
  if (dialTargetId) {
    const hidden = document.getElementById(dialTargetId);
    const label  = document.getElementById(dialTargetId + '-label');
    if (hidden) hidden.value = selected;
    if (label)  label.textContent = selected || '選択してください';
  }
  document.getElementById('dial-overlay').classList.remove('open');
}

function dialOverlayClick(e) {
  if (e.target === document.getElementById('dial-overlay')) closeDial();
}

// ===== 初期化 =====
restoreFromLocalStorage();
buildSidebar();
updateProgress();

// ===== サイドバーを開く（スマホ用） =====
function openSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.classList.add('has-form');  // CSSでdisplay:blockになる
  sidebar.style.maxHeight = 'calc(100vh - 52px)'; // 全画面で開く
  document.getElementById('main').style.display = 'none';
}

// ===== ダークモード =====
function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const newTheme = isDark ? 'light' : 'dark';
  applyTheme(newTheme);
  localStorage.setItem('theme', newTheme);
}

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'dark' : '');
  const btn = document.getElementById('theme-btn');
  if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
}

// ページ読込時にテーマ復元
(function() {
  const saved = localStorage.getItem('theme') || 'light';
  applyTheme(saved);
})();
</script>

<script>
// ===== スワイプで点検表切り替え（アニメーション付き） =====
(function() {
  const PREV     = 'vaporizer_daily.html';
  const NEXT     = 'piping_inspection.html';
  const THRESHOLD = 50;
  const MAX_VERT  = 35;

  let startX = 0, startY = 0;
  let isHoriz = null; // null=未確定, true=横, false=縦

  function setTranslate(x, animate) {
    document.body.style.transition = animate
      ? 'transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94)'
      : 'none';
    document.body.style.transform = `translateX(${x}px)`;
  }

  document.addEventListener('touchstart', function(e) {
    startX  = e.touches[0].clientX;
    startY  = e.touches[0].clientY;
    isHoriz = null;
    document.body.style.transition = 'none';
    document.body.style.transform  = 'translateX(0)';
  }, { passive: true });

  document.addEventListener('touchmove', function(e) {
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;

    // 方向未確定のうちに判断
    if (isHoriz === null) {
      if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
        isHoriz = Math.abs(dx) > Math.abs(dy);
      }
      return;
    }

    if (!isHoriz) return; // 縦スクロールと確定したら何もしない

    // 横スワイプ確定：デフォルト動作を止めて画面を追従させる
    e.preventDefault();
    const resistance = 0.45;
    setTranslate(dx * resistance, false);
  }, { passive: false }); // ← preventDefaultのためpassive:false

  document.addEventListener('touchend', function(e) {
    if (!isHoriz) {
      setTranslate(0, false);
      return;
    }

    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;

    if (Math.abs(dy) > MAX_VERT && Math.abs(dy) > Math.abs(dx)) {
      setTranslate(0, true);
      return;
    }

    if (dx > THRESHOLD) {
      setTranslate(window.innerWidth, true);
      setTimeout(() => { window.location.href = NEXT; }, 280);
    } else if (dx < -THRESHOLD) {
      setTranslate(-window.innerWidth, true);
      setTimeout(() => { window.location.href = PREV; }, 280);
    } else {
      setTranslate(0, true);
    }
  }, { passive: true });
})();
</script>
